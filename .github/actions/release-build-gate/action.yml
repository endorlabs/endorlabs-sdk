name: Release Build Gate
description: >-
  Quality gate, ship-artifact verification, and wheel build shared by production
  and TestPyPI release workflows.

inputs:
  version:
    description: PEP 440 version (sets SETUPTOOLS_SCM_PRETEND_VERSION)
    required: true
  fetch-spec:
    description: Download live OpenAPI spec before ship-artifact verify
    required: false
    default: "true"
  verify-changelog:
    description: Require docs/changelog.md section ## {version}
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set release version
      shell: bash
      run: |
        echo "SETUPTOOLS_SCM_PRETEND_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
        echo "Release version: ${{ inputs.version }}"

    - name: Verify hatch-vcs version resolution
      shell: bash
      run: uv run python devtools/check_vcs_version.py

    - name: Run quality gate
      shell: bash
      run: |
        uv run ruff check .
        uv run ruff format --check .
        uv run pyright
        uv run pytest tests/unit/ -x -m "not interactive and not long"

    - name: Verify ship artifacts
      shell: bash
      run: |
        set -euo pipefail
        ARGS=(run python devtools/verify_ship_artifacts.py)
        if [ "${{ inputs.fetch-spec }}" = "true" ]; then
          ARGS+=(--fetch-spec)
        fi
        if [ "${{ inputs.verify-changelog }}" = "true" ]; then
          ARGS+=(--verify-changelog "${{ inputs.version }}")
        fi
        uv "${ARGS[@]}"

    - name: Build package
      shell: bash
      run: uv build

    - name: Verify distribution metadata
      shell: bash
      run: uv run twine check dist/*
