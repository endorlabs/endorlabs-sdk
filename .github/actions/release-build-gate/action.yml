name: Release Build Gate
description: >-
  Quality gate, ship-artifact verification, and wheel build shared by production
  and TestPyPI release workflows.

inputs:
  version:
    description: PEP 440 release version (must match committed [project].version)
    required: true
  fetch-spec:
    description: Download live OpenAPI spec before ship-artifact verify
    required: false
    default: "true"
  verify-changelog:
    description: Require docs/changelog.md section ## {version}
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Log release version
      shell: bash
      run: 'echo "Release version: ${{ inputs.version }}"'

    - name: Verify static project version
      shell: bash
      run: >-
        uv run python devtools/ship/check_project_version.py
        --expect "${{ inputs.version }}"
        --no-tag-warnings

    - name: Run quality gate
      shell: bash
      run: |
        uv run ruff check .
        uv run ruff format --check .
        uv run pyright
        uv run pytest tests/unit/ -x -m "not interactive and not long"

    - name: Verify ship artifacts
      shell: bash
      run: |
        set -euo pipefail
        ARGS=(run python devtools/ship/verify_ship_artifacts.py)
        if [ "${{ inputs.fetch-spec }}" = "true" ]; then
          ARGS+=(--fetch-spec)
        fi
        if [ "${{ inputs.verify-changelog }}" = "true" ]; then
          ARGS+=(--verify-changelog "${{ inputs.version }}")
        fi
        uv "${ARGS[@]}"

    - name: Build package
      shell: bash
      run: uv build

    - name: Verify distribution metadata
      shell: bash
      run: uv run twine check dist/*

    - name: Smoke test built wheel
      shell: bash
      run: >-
        uv run python devtools/ship/smoke_test_wheel.py
        --expect-version "${{ inputs.version }}"
