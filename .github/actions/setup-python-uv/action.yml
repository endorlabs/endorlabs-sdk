name: 'Setup Python with UV'
description: 'Setup Python and UV with dependency caching for Endor Labs SDK'
inputs:
  python-version:
    description: 'Python version to use'
    required: true
    default: '3.13'
  cache-key:
    description: 'Cache key for UV dependencies (optional)'
    required: false
    default: ''
  install-dependencies:
    description: 'Whether to install dependencies'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache UV dependencies
      uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
      with:
        path: ${{ env.HOME }}/.cache/uv
        key: ${{ inputs.cache-key || format('{0}-uv-{1}-{2}', runner.os, inputs.python-version, hashFiles('**/pyproject.toml')) }}
        restore-keys: |
          ${{ runner.os }}-uv-${{ inputs.python-version }}-
          ${{ runner.os }}-uv-

    - name: Cache virtual environment
      uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
      with:
        path: .venv
        key: ${{ inputs.cache-key || format('{0}-uv-{1}-{2}', runner.os, inputs.python-version, hashFiles('**/pyproject.toml')) }}-venv
        restore-keys: |
          ${{ runner.os }}-uv-${{ inputs.python-version }}-venv-
          ${{ runner.os }}-uv-venv-

    - name: Install UV
      uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
      with:
        version: "0.9.3"

    - name: Install dependencies (dev only)
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: |
        # Always sync to ensure dependencies are up to date
        echo "Installing dependencies..."
        uv sync --dev
