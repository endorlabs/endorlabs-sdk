name: 'Setup Python with UV'
description: 'Setup Python and UV with dependency caching for Endor Labs SDK'
inputs:
  python-version:
    description: 'Python version to use'
    required: true
    default: '3.13'
  uv-version:
    description: 'UV version to install'
    required: false
    default: '0.9.3'
  install-dependencies:
    description: 'Whether to install dependencies'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Install UV
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ inputs.uv-version }}
        python-version: ${{ inputs.python-version }}
        enable-cache: true
        cache-dependency-glob: |
          **/pyproject.toml
          **/uv.lock

    - name: Install dependencies (dev only)
      if: inputs.install-dependencies == 'true'
      shell: bash
      # Credentials come from the caller workflow env (UV_INDEX_ENDOR_FIREWALL_*),
      # matching [[tool.uv.index]] name = "endor-firewall" in pyproject.toml.
      run: |
        set -euo pipefail
        if [ -z "${UV_INDEX_ENDOR_FIREWALL_USERNAME:-}" ] || [ -z "${UV_INDEX_ENDOR_FIREWALL_PASSWORD:-}" ]; then
          echo "::error::Missing Endor package firewall credentials for uv sync."
          echo "Configure repository Secrets:"
          echo "  UV_INDEX_ENDOR_FIREWALL_USERNAME"
          echo "  UV_INDEX_ENDOR_FIREWALL_PASSWORD"
          exit 1
        fi
        echo "Installing dependencies via Endor package firewall index..."
        uv sync --dev
