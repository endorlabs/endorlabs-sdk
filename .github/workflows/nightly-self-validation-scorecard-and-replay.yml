name: Nightly Self-Validation Scorecard and Replay

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: smoke or full"
        required: false
        default: "smoke"
        type: choice
        options: ["smoke", "full"]
      repository_url:
        description: "Repository URL to analyze (empty uses default)"
        required: false
        default: ""
        type: string
      deterministic:
        description: "Write deterministic artifacts"
        required: false
        default: true
        type: boolean
      strict_threat_claims:
        description: "Fail when threat-model claims are unverifiable"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [nightly-self-validation]

concurrency:
  group: nightly-self-validation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  self-validation:
    name: Generate Self-Validation Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHON_VERSION: "3.13"
      UV_VERSION: "0.9.3"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve runtime inputs
        id: runtime
        run: |
          MODE="${{ github.event.inputs.mode || github.event.client_payload.mode || 'smoke' }}"
          REPOSITORY_URL="${{ github.event.inputs.repository_url || github.event.client_payload.repository_url || '' }}"
          DETERMINISTIC="${{ github.event.inputs.deterministic || github.event.client_payload.deterministic || 'true' }}"
          STRICT_CLAIMS="${{ github.event.inputs.strict_threat_claims || github.event.client_payload.strict_threat_claims || 'false' }}"

          if [ -z "$REPOSITORY_URL" ]; then
            REPOSITORY_URL="https://github.com/Endor-Solutions-Architecture/endorlabs-sdk.git"
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "repository_url=$REPOSITORY_URL" >> "$GITHUB_OUTPUT"
          echo "deterministic=$DETERMINISTIC" >> "$GITHUB_OUTPUT"
          echo "strict_claims=$STRICT_CLAIMS" >> "$GITHUB_OUTPUT"

      - name: Validate OIDC prerequisites
        run: |
          if [ -z "${{ vars.ENDOR_NAMESPACE }}" ]; then
            echo "ENDOR_NAMESPACE variable is required"
            exit 1
          fi

      - name: Set up Endor Labs OIDC auth
        uses: endorlabs/github-action/setup@ea13ac38613bbf08ee75ec21ddec172e648976b7
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}

      - name: Validate GitHub OIDC auth policy
        run: |
          set -euo pipefail
          POLICY_JSON="$(endorctl api list -r AuthorizationPolicy -n "${{ vars.ENDOR_NAMESPACE }}" --traverse)"
          MATCH_COUNT="$(echo "$POLICY_JSON" | jq --arg claim "user=${{ github.repository_owner }}" --arg provider "github-action" --arg namespace "${{ vars.ENDOR_NAMESPACE }}" '[.list.objects[]? | select((.spec.permissions.roles // []) | index("SYSTEM_ROLE_CODE_SCANNER")) | select((.spec.clause // []) | index($claim)) | select((.spec.clause // []) | index($provider)) | select((.spec.target_namespaces // []) | index($namespace)) | select(.spec.propagate == true)] | length')"
          if [ "$MATCH_COUNT" -lt 1 ]; then
            echo "::error::Missing or mismatched OIDC authorization policy. Expected clauses include github-action and user=${{ github.repository_owner }}, role=SYSTEM_ROLE_CODE_SCANNER, target=${{ vars.ENDOR_NAMESPACE }}, propagate=true"
            exit 1
          fi
          echo "OIDC policy validation passed."

      - name: OIDC smoke command
        run: |
          endorctl api list -r Project -n "${{ vars.ENDOR_NAMESPACE }}" --count

      - name: Validate required secrets
        run: |
          if [ -z "${{ vars.ENDOR_NAMESPACE }}" ]; then
            echo "ENDOR_NAMESPACE variable is required"
            exit 1
          fi
          if [ -z "${{ vars.ENDOR_API }}" ]; then
            echo "ENDOR_API variable is required"
            exit 1
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_KEY }}" ]; then
            echo "ENDOR_API_CREDENTIALS_KEY secret is required"
            exit 1
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}" ]; then
            echo "ENDOR_API_CREDENTIALS_SECRET secret is required"
            exit 1
          fi

      - name: Generate self-validation scorecard
        run: |
          EXTRA_ARGS=""
          if [ "${{ steps.runtime.outputs.deterministic }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --deterministic"
          fi
          if [ "${{ steps.runtime.outputs.strict_claims }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --strict-threat-claims"
          fi

          uv run python scripts/self_validation_scorecard.py \
            --repository-url "${{ steps.runtime.outputs.repository_url }}" \
            --tenant "${{ vars.ENDOR_NAMESPACE }}" \
            --output-dir ".endorlabs-context/self-validation" \
            --num-scans 2 \
            $EXTRA_ARGS
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}

      - name: Optional orphan finding hygiene check
        if: steps.runtime.outputs.mode == 'full'
        run: |
          uv run python scripts/list_orphaned_findings.py \
            --tenant "${{ vars.ENDOR_NAMESPACE }}" \
            --dry-run \
            --pretty-json \
            > ".endorlabs-context/self-validation/orphaned-findings.json"
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}

      - name: Upload self-validation artifacts
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: self-validation-artifacts-${{ github.run_number }}
          path: .endorlabs-context/self-validation/
          retention-days: 30

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Nightly Self-Validation Summary"
            echo ""
            echo "- Mode: \`${{ steps.runtime.outputs.mode }}\`"
            echo "- Repository: \`${{ steps.runtime.outputs.repository_url }}\`"
            echo "- Deterministic: \`${{ steps.runtime.outputs.deterministic }}\`"
            echo "- Strict threat claims: \`${{ steps.runtime.outputs.strict_claims }}\`"
            echo "- Artifacts: \`.endorlabs-context/self-validation/\`"
          } >> "$GITHUB_STEP_SUMMARY"
