name: Release TestPyPI Publish

# Manual TestPyPI publish via OIDC Trusted Publishing (PEP 740 attestations by default).
# Configure a pending publisher on test.pypi.org before first upload:
#   Owner: endorlabs · Repo: endorlabs-sdk · Workflow: release-testpypi.yml · Environment: testpypi
# See docs/contributing/release-publishing.md

on:
  workflow_dispatch:
    inputs:
      version:
        description: "PEP 440 version to publish (e.g. 0.1.1)"
        required: true
        type: string
      ref:
        description: "Git ref to build from"
        required: false
        default: main
        type: string

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.9.3"

jobs:
  build:
    name: Build and Verify Artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Validate version input
        id: version
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+)*((a|b|rc)[0-9]+)?(\.post[0-9]+)?(\.dev[0-9]+)?$ ]]; then
            echo "::error::Invalid PEP 440 version: ${VERSION}"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION}"

      - name: Run release build gate
        uses: ./.github/actions/release-build-gate
        with:
          version: ${{ steps.version.outputs.version }}
          fetch-spec: "true"
          verify-changelog: "true"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI (OIDC)
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI with attestations
        # Pin to commit SHA (Endor GHA policy); image tag matches GITHUB_SHA from PyPA release/v1 builds.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - name: Setup Python with UV for smoke install
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Smoke test published install
        run: >-
          uv run python devtools/ship/smoke_test_published_install.py
          --version ${{ needs.build.outputs.version }}

      - name: Publish TestPyPI summary
        run: |
          {
            echo "## TestPyPI Publish Summary"
            echo ""
            echo "| Signal | Value |"
            echo "|---|---|"
            echo "| Version | \`${{ needs.build.outputs.version }}\` |"
            echo "| Index | \`https://test.pypi.org/project/endorlabs/\` |"
            echo "| Auth | OIDC Trusted Publishing (no API token) |"
            echo "| Attestations | PEP 740 (default via gh-action-pypi-publish) |"
            echo ""
            echo "### Smoke install"
            echo "\`\`\`bash"
            echo "python -m venv /tmp/endorlabs-smoke"
            echo "/tmp/endorlabs-smoke/bin/python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ endorlabs==${{ needs.build.outputs.version }}"
            echo "/tmp/endorlabs-smoke/bin/python -c \"import endorlabs; print(endorlabs.__version__)\""
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
