name: Schema Drift Detection

# GITHUB_TOKEN needs issues: write to create one issue per detected drift
permissions:
  contents: read
  issues: write

on:
  schedule:
    # Run hourly to check for endorctl version updates
    - cron: '0 * * * *'
    # Also run weekly on Mondays at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run drift detection even without endorctl version change"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      force_run:
        description: "Run drift detection even without endorctl version change"
        required: false
        default: false
        type: boolean
        # Keep false by default for reusable call sites.
  repository_dispatch:
    types: [schema-drift-check]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    name: Check Endorctl Version and OpenAPI Hash
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version-changed: ${{ steps.check.outputs.version-changed }}
      spec-changed: ${{ steps.check.outputs.spec-changed }}
      latest-version: ${{ steps.check.outputs.version }}
      openapi-sha256: ${{ steps.check.outputs.openapi-sha256 }}
      check-status: ${{ steps.check.outputs.status }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install UV
        uses: astral-sh/setup-uv@v7.2.0
        with:
          version: "0.9.3"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Restore cached drift state
        id: cache-version
        uses: actions/cache@v5.0.2
        with:
          path: .github/cache/schema_drift_state.json
          key: schema-drift-state-${{ runner.os }}
          restore-keys: |
            schema-drift-state-${{ runner.os }}

      - name: Check for version/hash update
        id: check
        run: |
          STATE_FILE=".github/cache/schema_drift_state.json"
          VERSION_FILE=".github/cache/endorctl_version.txt"
          SPEC_FILE=".github/cache/openapiv2.swagger.json"
          mkdir -p .github/cache

          # Get latest endorctl version (fail-closed on script error)
          set +e
          uv run python .github/scripts/check_endorctl_version.py \
            --state-file "$VERSION_FILE" \
            --quiet
          VERSION_EXIT_CODE=$?
          set -e
          if [ $VERSION_EXIT_CODE -ne 0 ] && [ $VERSION_EXIT_CODE -ne 1 ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Version check failed (exit=$VERSION_EXIT_CODE)"
            exit 1
          fi

          LATEST_VERSION=$(cat "$VERSION_FILE" 2>/dev/null || echo "")
          if [ -z "$LATEST_VERSION" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Could not determine latest endorctl version"
            exit 1
          fi

          # Download OpenAPI and compute hash
          curl -sSfL -o "$SPEC_FILE" https://api.endorlabs.com/download/openapiv2.swagger.json
          OPENAPI_SHA256=$(sha256sum "$SPEC_FILE" | awk '{print $1}')
          if [ -z "$OPENAPI_SHA256" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Could not compute OpenAPI hash"
            exit 1
          fi

          PREV_VERSION=""
          PREV_HASH=""
          if [ -f "$STATE_FILE" ]; then
            PREV_VERSION=$(python -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('endorctl_version',''))" 2>/dev/null || echo "")
            PREV_HASH=$(python -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('openapi_sha256',''))" 2>/dev/null || echo "")
          fi

          VERSION_CHANGED=false
          SPEC_CHANGED=false
          if [ "$PREV_VERSION" != "$LATEST_VERSION" ]; then VERSION_CHANGED=true; fi
          if [ "$PREV_HASH" != "$OPENAPI_SHA256" ]; then SPEC_CHANGED=true; fi

          if [ "$VERSION_CHANGED" = "true" ] || [ "$SPEC_CHANGED" = "true" ]; then
            CHANGED=true
          else
            CHANGED=false
          fi

          python -c "import json,datetime; json.dump({'endorctl_version':'$LATEST_VERSION','openapi_sha256':'$OPENAPI_SHA256','updated_at':datetime.datetime.utcnow().replace(microsecond=0).isoformat()+'Z'}, open('$STATE_FILE','w'))"

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "version-changed=$VERSION_CHANGED" >> $GITHUB_OUTPUT
          echo "spec-changed=$SPEC_CHANGED" >> $GITHUB_OUTPUT
          echo "status=ok" >> $GITHUB_OUTPUT
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "openapi-sha256=$OPENAPI_SHA256" >> $GITHUB_OUTPUT

          if [ "$VERSION_CHANGED" = "true" ]; then
            echo "🔄 endorctl version update detected: ${PREV_VERSION:-<none>} -> $LATEST_VERSION"
          else
            echo "✅ endorctl version unchanged: $LATEST_VERSION"
          fi
          if [ "$SPEC_CHANGED" = "true" ]; then
            echo "🔄 OpenAPI hash update detected: ${PREV_HASH:-<none>} -> $OPENAPI_SHA256"
          else
            echo "✅ OpenAPI hash unchanged: $OPENAPI_SHA256"
          fi

      - name: Save drift state to cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache@v5.0.2
        with:
          path: .github/cache/schema_drift_state.json
          key: schema-drift-state-${{ runner.os }}-${{ steps.check.outputs.version }}-${{ steps.check.outputs.openapi-sha256 }}
          restore-keys: |
            schema-drift-state-${{ runner.os }}

  detect-schema-drift:
    name: Detect Schema Drift
    needs: check-version
    # Run when endorctl version changed, OpenAPI hash changed, or manual trigger.
    if: >-
      needs.check-version.result == 'success' &&
      (
        needs.check-version.outputs.version-changed == 'true' ||
        needs.check-version.outputs.spec-changed == 'true' ||
        inputs.force_run == true ||
        github.event.inputs.force_run == 'true' ||
        github.event_name == 'repository_dispatch' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"

      - name: Validate dependencies
        run: |
          echo "Validating required dependencies are installed..."
          uv run python -c "import pytest; print(f'✅ pytest {pytest.__version__}')" || (echo "❌ pytest not found" && exit 1)
          uv run python -c "import pydantic; print(f'✅ pydantic {pydantic.__version__}')" || (echo "❌ pydantic not found" && exit 1)
          echo "✅ All required dependencies are installed"

      - name: Download OpenAPI spec
        run: |
          mkdir -p .endorlabs-context
          curl -sSfL -o .endorlabs-context/openapiv2.swagger.json https://api.endorlabs.com/download/openapiv2.swagger.json

      - name: Run schema drift detection
        run: |
          uv run python .github/scripts/detect_schema_drift.py \
            --run-tests \
            --test-path tests/ \
            --output schema_drift_report.json
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}
          ENDORCTL_VERSION: ${{ needs.check-version.outputs.latest-version }}
          OPENAPI_SHA256: ${{ needs.check-version.outputs.openapi-sha256 }}
          OPENAPI_SOURCE_URL: https://api.endorlabs.com/download/openapiv2.swagger.json

      - name: Run model consistency report
        if: always()
        run: |
          uv run python .github/scripts/detect_schema_drift.py \
            --model-consistency \
            --output-format json \
            --consistency-output model_consistency_report

      - name: Create GitHub issues from drift report
        if: always()
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.env.GITHUB_WORKSPACE || '.', 'schema_drift_report.json');
            let report;
            try {
              report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            } catch (e) {
              core.info('No drift report or invalid JSON - skipping issue creation');
              return;
            }
            const newDrifts = (report.drifts || []).filter(d => d.status === 'new');
            if (newDrifts.length === 0) {
              core.info('No new drifts to report');
              return;
            }
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'schema-drift',
              per_page: 100
            });
            const existingTitles = new Set(openIssues.map(i => i.title));
            let created = 0;
            for (const d of newDrifts) {
              const title = `Schema Drift: ${d.resource_name || 'Unknown'}.${d.field_path || d.field || 'unknown'}`;
              if (existingTitles.has(title)) continue;
              const body = [
                "## Schema Drift Detected",
                "",
                `**Resource**: \`${d.resource_name || 'Unknown'}\``,
                `**Model**: \`${d.model_path || d.model || 'Unknown'}\``,
                `**Field Path**: \`${d.field_path || 'unknown'}\``,
                `**Field**: \`${d.field || 'unknown'}\``,
                `**File to Modify**: \`${d.file_path || 'see OpenAPI spec'}\``,
                "",
                "This field was detected in API responses but is not defined in the Pydantic model.",
                "",
                "### Action Required",
                "",
                "1. Review OpenAPI spec: `https://api.endorlabs.com/download/openapiv2.swagger.json` (workflow downloads it to `.endorlabs-context/openapiv2.swagger.json`).",
                `2. Add field to model: \`${d.file_path || 'resource file'}\``,
                "3. Update drift detection known_fields if applicable",
                "",
                "### Detection",
                "",
                "Automatically created by the schema drift detection workflow.",
              ].join('\\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['schema-drift', 'automated', 'api-schema']
              });
              existingTitles.add(title);
              created++;
            }
            core.info(`Created ${created} issue(s) for new drifts.`);

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: schema-drift-report-${{ needs.check-version.outputs.latest-version || 'manual' }}-${{ needs.check-version.outputs.openapi-sha256 || 'nohash' }}
          path: schema_drift_report.json
          retention-days: 30

      - name: Upload model consistency report
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: model-consistency-report-${{ needs.check-version.outputs.latest-version || 'manual' }}-${{ needs.check-version.outputs.openapi-sha256 || 'nohash' }}
          path: model_consistency_report.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if [ -f schema_drift_report.json ]; then
            echo "## Schema Drift Detection Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "${{ needs.check-version.outputs.version-changed }}" == "true" ]; then
              echo "**Triggered by endorctl version update**: ${{ needs.check-version.outputs.latest-version }}" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "${{ needs.check-version.outputs.spec-changed }}" == "true" ]; then
              echo "**Triggered by OpenAPI hash update**: ${{ needs.check-version.outputs.openapi-sha256 }}" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            uv run python -c "
            import json
            with open('schema_drift_report.json') as f:
                report = json.load(f)
            summary = report.get('summary', {})
            print(f\"- **New drifts detected**: {summary.get('new_drifts', 0)}\")
            print(f\"- **Validation errors**: {summary.get('validation_errors', 0)}\")
            print(f\"- **Test status**: {summary.get('test_status', 'unknown')}\")
            print(f\"- **endorctl version**: {summary.get('endorctl_version', 'unknown')}\")
            print(f\"- **OpenAPI SHA256**: {summary.get('openapi_sha256', 'unknown')}\")
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "No drift report generated" >> $GITHUB_STEP_SUMMARY
          fi
