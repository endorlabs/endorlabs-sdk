name: Model Sync PR

on:
  repository_dispatch:
    types: [model-sync-check]
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run even when no external trigger payload is provided"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: model-sync-sync-pr-chore-model-sync-auto
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  OPENAPI_SOURCE_URL_DEFAULT: "https://api.endorlabs.com/download/openapiv2.swagger.json"
  OPENAPI_SPEC_PATH: ".endorlabs-context/openapiv2.swagger.json"
  PYTEST_MAXFAIL: "2"
  CLEANUP_TTL_DAYS: "30"
  CLEANUP_KEEP_LAST_N: "3"

jobs:
  validate-generated-artifacts:
    name: Generate and Validate Sync Artifacts
    runs-on: ubuntu-latest
    outputs:
      endorctl_version: ${{ steps.trigger.outputs.endorctl_version }}
      prev_endorctl_version: ${{ steps.trigger.outputs.prev_endorctl_version }}
      openapi_sha256: ${{ steps.trigger.outputs.openapi_sha256 }}
      prev_openapi_sha256: ${{ steps.trigger.outputs.prev_openapi_sha256 }}
      openapi_source_url: ${{ steps.trigger.outputs.openapi_source_url }}
      reason: ${{ steps.trigger.outputs.reason }}
      upstream_changed: ${{ steps.trigger.outputs.upstream_changed }}
      version_changed: ${{ steps.trigger.outputs.version_changed }}
      spec_changed: ${{ steps.trigger.outputs.spec_changed }}
      branch_name: ${{ steps.trigger.outputs.branch_name }}
      repo_baseline_endorctl: ${{ steps.trigger.outputs.repo_baseline_endorctl }}
      repo_baseline_spec_sha256: ${{ steps.trigger.outputs.repo_baseline_spec_sha256 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve trigger metadata
        id: trigger
        run: |
          ENDORCTL_VERSION="${{ github.event.client_payload.endorctl_version || '' }}"
          PREV_ENDORCTL_VERSION="${{ github.event.client_payload.prev_endorctl_version || '' }}"
          OPENAPI_SHA256="${{ github.event.client_payload.openapi_sha256 || '' }}"
          PREV_OPENAPI_SHA256="${{ github.event.client_payload.prev_openapi_sha256 || '' }}"
          OPENAPI_SOURCE_URL="${{ github.event.client_payload.openapi_source_url || env.OPENAPI_SOURCE_URL_DEFAULT }}"
          REASON="${{ github.event.client_payload.reason || 'manual' }}"
          UPSTREAM_CHANGED="${{ github.event.client_payload.upstream_changed || 'unknown' }}"
          VERSION_CHANGED="${{ github.event.client_payload.version_changed || 'unknown' }}"
          SPEC_CHANGED="${{ github.event.client_payload.spec_changed || 'unknown' }}"
          REPO_BASELINE_ENDORCTL="${{ github.event.client_payload.repo_baseline_endorctl || '' }}"
          REPO_BASELINE_SPEC_SHA256="${{ github.event.client_payload.repo_baseline_spec_sha256 || '' }}"
          BRANCH_NAME="chore/model-sync-auto"

          echo "endorctl_version=$ENDORCTL_VERSION" >> "$GITHUB_OUTPUT"
          echo "prev_endorctl_version=$PREV_ENDORCTL_VERSION" >> "$GITHUB_OUTPUT"
          echo "openapi_sha256=$OPENAPI_SHA256" >> "$GITHUB_OUTPUT"
          echo "prev_openapi_sha256=$PREV_OPENAPI_SHA256" >> "$GITHUB_OUTPUT"
          echo "openapi_source_url=$OPENAPI_SOURCE_URL" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "upstream_changed=$UPSTREAM_CHANGED" >> "$GITHUB_OUTPUT"
          echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"
          echo "spec_changed=$SPEC_CHANGED" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "repo_baseline_endorctl=$REPO_BASELINE_ENDORCTL" >> "$GITHUB_OUTPUT"
          echo "repo_baseline_spec_sha256=$REPO_BASELINE_SPEC_SHA256" >> "$GITHUB_OUTPUT"

      - name: Guard against unsupported dispatch payload
        if: github.event_name == 'repository_dispatch'
        run: |
          if [ "${{ github.event.action }}" != "model-sync-check" ]; then
            echo "Unexpected repository_dispatch action: ${{ github.event.action }}"
            exit 1
          fi

      - name: Download OpenAPI spec
        run: |
          mkdir -p .endorlabs-context
          curl -sSfL -o "${{ env.OPENAPI_SPEC_PATH }}" "${{ steps.trigger.outputs.openapi_source_url }}"

      - name: Verify OpenAPI payload hash when provided
        run: |
          EXPECTED="${{ steps.trigger.outputs.openapi_sha256 }}"
          if [ -z "$EXPECTED" ]; then
            echo "::notice::No expected OpenAPI hash provided by trigger payload; skipping hash verification."
            exit 0
          fi
          ACTUAL=$(sha256sum "${{ env.OPENAPI_SPEC_PATH }}" | awk '{print $1}')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::OpenAPI hash mismatch. expected=$EXPECTED actual=$ACTUAL"
            exit 1
          fi
          echo "✅ OpenAPI hash verified: $ACTUAL"

      - name: Run canonical model sync generation
        run: |
          uv run python scripts/model_sync.py --generate-stubs --generate-reference-docs
          test -f workspace/model-sync/custom_mapping/mapping/entity_mapping.json
          test -f workspace/model-sync/custom_mapping/provenance.json
          test -f workspace/model-sync/custom_mapping/artifacts_manifest.json
          test -f workspace/model-sync/custom_mapping/facade_contract.json
          test -f workspace/model-sync/custom_mapping/mapping/registry_parity_report.json
          test -f workspace/model-sync/custom_mapping/mapping/operation_path_metadata.json
          test -f workspace/model-sync/custom_mapping/mapping/payload_schemas.json
          test -f workspace/model-sync/custom_mapping/mapping/runtime_index.json
          test -f src/endorlabs/generated/models/__init__.py
          test -f docs/generated-reference/coverage.json
        env:
          ENDORCTL_VERSION: ${{ steps.trigger.outputs.endorctl_version }}
          OPENAPI_SHA256: ${{ steps.trigger.outputs.openapi_sha256 }}
          OPENAPI_SOURCE_URL: ${{ steps.trigger.outputs.openapi_source_url }}

      - name: Upload generated sync artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: model-sync-generated
          if-no-files-found: error
          path: |
            workspace/model-sync
            src/endorlabs/generated
            src/endorlabs/client_surface.pyi
            docs/generated-reference
            .endorlabs-context/openapiv2.swagger.json

      - name: Run lint/typecheck quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright --project pyproject.toml

      - name: Run unit test suite
        run: |
          uv run pytest tests/unit/ --maxfail=${{ env.PYTEST_MAXFAIL }} -m "not slow and not long"

      - name: Compute resource delta JSON
        id: resource_delta_json
        run: |
          uv run python scripts/model_sync_pr_deltas.py --auto-baseline --write-github-output --resource-json-only

      - name: Detect non-generated src drift
        id: src_drift
        run: |
          FILES=$(
            git status --porcelain -- src \
              | sed '/^$/d' \
              | sed -E 's/^...//' \
              | sed -E 's/^[^[:space:]]+[[:space:]]+//' \
              | sed -E 's/^"//; s/"$//' \
              | sed -E 's# -> .*##' \
              | sort -u
          )
          NON_GENERATED=$(
            printf "%s\n" "$FILES" \
              | sed '/^$/d' \
              | grep '^src/' \
              | grep -v '^src/endorlabs/generated/' \
              | grep -v '^src/endorlabs/client_surface.pyi$' \
              || true
          )
          if [ -n "$NON_GENERATED" ]; then
            echo "src_non_generated_changed=true" >> "$GITHUB_OUTPUT"
            echo "src_non_generated_files<<EOF" >> "$GITHUB_OUTPUT"
            printf "%s\n" "$NON_GENERATED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "src_non_generated_changed=false" >> "$GITHUB_OUTPUT"
            echo "src_non_generated_files=" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate integration test prerequisites
        id: integration_prereqs
        run: |
          SHOULD_RUN=true
          if [ -z "${{ vars.ENDOR_API }}" ]; then
            SHOULD_RUN=false
          fi
          if [ -z "${{ vars.ENDOR_NAMESPACE }}" ]; then
            SHOULD_RUN=false
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_KEY }}" ]; then
            SHOULD_RUN=false
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}" ]; then
            SHOULD_RUN=false
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Select integration test scope
        id: integration_scope
        run: |
          if [ "${{ steps.integration_prereqs.outputs.should_run }}" != "true" ]; then
            echo "run_integration_selected=false" >> "$GITHUB_OUTPUT"
            echo "selection_mode=skip" >> "$GITHUB_OUTPUT"
            echo "selection_reason=required ENDOR_* vars/secrets are not fully configured" >> "$GITHUB_OUTPUT"
            echo "selected_test_paths=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.src_drift.outputs.src_non_generated_changed }}" = "true" ]; then
            echo "run_integration_selected=true" >> "$GITHUB_OUTPUT"
            echo "selection_mode=full" >> "$GITHUB_OUTPUT"
            echo "selection_reason=non-generated src drift detected" >> "$GITHUB_OUTPUT"
            echo "selected_test_paths=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${DELTA_JSON}" ]; then
            echo "run_integration_selected=false" >> "$GITHUB_OUTPUT"
            echo "selection_mode=skip" >> "$GITHUB_OUTPUT"
            echo "selection_reason=no resource delta JSON available" >> "$GITHUB_OUTPUT"
            echo "selected_test_paths=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import sys

          out_path = os.environ["GITHUB_OUTPUT"]
          delta_json = os.environ.get("DELTA_JSON", "")
          try:
              data = json.loads(delta_json)
          except json.JSONDecodeError:
              data = {}

          changed = data.get("changed_resources", [])
          if not isinstance(changed, list):
              changed = []

          def to_snake(name: str) -> str:
              return re.sub(r"(?<!^)(?=[A-Z])", "_", name).lower()

          selected: set[str] = set()
          unmapped: list[str] = []
          for item in sorted(x for x in changed if isinstance(x, str)):
              candidate = pathlib.Path(f"tests/integration/resources/test_{to_snake(item)}.py")
              if candidate.exists():
                  selected.add(candidate.as_posix())
              else:
                  unmapped.append(item)

          workflow_map = {
              "Finding": "tests/integration/workflows/test_retrieving_scan_results.py",
              "Project": "tests/integration/workflows/test_retrieving_scan_results.py",
              "Repository": "tests/integration/workflows/test_retrieving_scan_results.py",
              "RepositoryVersion": "tests/integration/workflows/test_retrieving_scan_results.py",
              "ScanResult": "tests/integration/workflows/test_retrieving_scan_results.py",
          }
          for item in sorted(x for x in changed if isinstance(x, str)):
              wf = workflow_map.get(item)
              if wf and pathlib.Path(wf).exists():
                  selected.add(wf)

          with open(out_path, "a", encoding="utf-8") as fh:
              if changed and unmapped:
                  fh.write("run_integration_selected=true\n")
                  fh.write("selection_mode=full\n")
                  fh.write("selection_reason=resource deltas include unmapped resources\n")
                  fh.write("selected_test_paths<<EOF\n")
                  for path in sorted(selected):
                      fh.write(f"{path}\n")
                  fh.write("EOF\n")
                  sys.exit(0)
              if selected:
                  fh.write("run_integration_selected=true\n")
                  fh.write("selection_mode=targeted\n")
                  fh.write("selection_reason=resource deltas mapped to targeted integration tests\n")
                  fh.write("selected_test_paths<<EOF\n")
                  for path in sorted(selected):
                      fh.write(f"{path}\n")
                  fh.write("EOF\n")
                  sys.exit(0)
              fh.write("run_integration_selected=false\n")
              fh.write("selection_mode=skip\n")
              fh.write("selection_reason=no relevant resource deltas detected\n")
              fh.write("selected_test_paths=\n")
          PY
        env:
          DELTA_JSON: ${{ steps.resource_delta_json.outputs.delta_json || '' }}

      - name: Run full integration test suite
        if: >-
          steps.integration_scope.outputs.run_integration_selected == 'true' &&
          steps.integration_scope.outputs.selection_mode == 'full'
        run: |
          uv run pytest tests/integration/ --maxfail=${{ env.PYTEST_MAXFAIL }} --disable-warnings -m "not long"
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}

      - name: Run targeted integration tests
        if: >-
          steps.integration_scope.outputs.run_integration_selected == 'true' &&
          steps.integration_scope.outputs.selection_mode == 'targeted'
        run: |
          mapfile -t TEST_PATHS <<< "${{ steps.integration_scope.outputs.selected_test_paths }}"
          uv run pytest "${TEST_PATHS[@]}" --maxfail=${{ env.PYTEST_MAXFAIL }} --disable-warnings -m "not long"
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}

      - name: Integration test skipped summary
        if: steps.integration_scope.outputs.run_integration_selected != 'true'
        run: |
          echo "::notice::Integration tests skipped: ${{ steps.integration_scope.outputs.selection_reason }}"

      - name: Publish integration selection summary
        if: always()
        run: |
          {
            echo "### Integration Test Selection"
            echo "- Prereqs available: \`${{ steps.integration_prereqs.outputs.should_run }}\`"
            echo "- src non-generated drift: \`${{ steps.src_drift.outputs.src_non_generated_changed }}\`"
            echo "- selection mode: \`${{ steps.integration_scope.outputs.selection_mode }}\`"
            echo "- selection reason: \`${{ steps.integration_scope.outputs.selection_reason }}\`"
            if [ -n "${{ steps.src_drift.outputs.src_non_generated_files || '' }}" ]; then
              echo "<details><summary>Non-generated src drift files</summary>"
              echo ""
              echo '```text'
              printf "%s\n" "${{ steps.src_drift.outputs.src_non_generated_files }}"
              echo '```'
              echo "</details>"
            fi
            if [ -n "${{ steps.integration_scope.outputs.selected_test_paths || '' }}" ]; then
              echo "<details><summary>Selected integration tests</summary>"
              echo ""
              echo '```text'
              printf "%s\n" "${{ steps.integration_scope.outputs.selected_test_paths }}"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  sync-and-pr:
    name: Open or Update Sync PR
    needs: [validate-generated-artifacts]
    if: needs.validate-generated-artifacts.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download generated sync artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: model-sync-generated
          path: .

      - name: Validate changed file scope
        id: diff_scope
        run: |
          EXCLUDED_FILE="workspace/model-sync/custom_mapping/provenance.json"
          PROVENANCE_FILE="workspace/model-sync/custom_mapping/provenance.json"
          PROVENANCE_CHANGED_COUNT=$(git status --porcelain -- "$PROVENANCE_FILE" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$PROVENANCE_CHANGED_COUNT" -gt 0 ]; then
            PROVENANCE_CHANGED=true
          else
            PROVENANCE_CHANGED=false
          fi
          mapfile -d '' FILES_ARRAY < <(git status --porcelain -z -- \
            workspace/model-sync \
            src/endorlabs/generated \
            src/endorlabs/client_surface.pyi \
            docs/generated-reference)
          if [ ${#FILES_ARRAY[@]} -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "generated_changed=false" >> "$GITHUB_OUTPUT"
            echo "changed_files=" >> "$GITHUB_OUTPUT"
            echo "changed_count=0" >> "$GITHUB_OUTPUT"
            echo "resource_changes=" >> "$GITHUB_OUTPUT"
            echo "resource_change_count=0" >> "$GITHUB_OUTPUT"
            echo "provenance_changed=$PROVENANCE_CHANGED" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILES=$(
            printf "%s\n" "${FILES_ARRAY[@]}" \
              | sed '/^$/d' \
              | sed -E 's/^...//' \
              | sed -E 's/^[^[:space:]]+[[:space:]]+//' \
              | sed -E 's/^"//; s/"$//' \
              | sed -E 's# -> .*##' \
              | sed "\#^${EXCLUDED_FILE}\$#d" \
              | sed '/^$/d' \
              | sort -u
          )
          CHANGED_COUNT=$(printf "%s\n" "$FILES" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$CHANGED_COUNT" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "generated_changed=false" >> "$GITHUB_OUTPUT"
            echo "changed_files=" >> "$GITHUB_OUTPUT"
            echo "changed_count=0" >> "$GITHUB_OUTPUT"
            echo "resource_changes=" >> "$GITHUB_OUTPUT"
            echo "resource_change_count=0" >> "$GITHUB_OUTPUT"
            echo "provenance_changed=$PROVENANCE_CHANGED" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESOURCES=$(
            printf "%s\n" "$FILES" \
              | sed -n 's#^src/endorlabs/generated/models/\(.*\)\.py$#\1#p' \
              | sed '/^__init__$/d' \
              | sed '/^$/d' \
              | sort -u
          )
          RESOURCE_COUNT=$(printf "%s\n" "$RESOURCES" | sed '/^$/d' | wc -l | tr -d ' ')
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "generated_changed=true" >> "$GITHUB_OUTPUT"
          echo "changed_count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "resource_change_count=$RESOURCE_COUNT" >> "$GITHUB_OUTPUT"
          echo "resource_changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESOURCES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "provenance_changed=$PROVENANCE_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Compute OpenAPI-derived upstream delta
        id: upstream_delta
        if: >-
          needs.validate-generated-artifacts.outputs.spec_changed == 'true' ||
          needs.validate-generated-artifacts.outputs.version_changed == 'true' ||
          github.event_name == 'workflow_dispatch'
        run: |
          uv run python scripts/model_sync_pr_deltas.py --auto-baseline --write-github-output --upstream-only

      - name: Compute resource and attribute deltas
        id: resource_delta
        if: >-
          steps.diff_scope.outputs.has_changes == 'true' ||
          needs.validate-generated-artifacts.outputs.spec_changed == 'true' ||
          needs.validate-generated-artifacts.outputs.version_changed == 'true' ||
          github.event_name == 'workflow_dispatch'
        run: |
          uv run python scripts/model_sync_pr_deltas.py --auto-baseline --write-github-output --resource-only

      - name: Compute provenance delta
        id: provenance_delta
        if: steps.diff_scope.outputs.provenance_changed == 'true'
        run: |
          uv run python scripts/model_sync_pr_deltas.py --auto-baseline --write-github-output --provenance-only

      - name: Push model-sync branch (manual PR)
        if: steps.diff_scope.outputs.generated_changed == 'true'
        env:
          BRANCH_NAME: ${{ needs.validate-generated-artifacts.outputs.branch_name }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          REASON: ${{ needs.validate-generated-artifacts.outputs.reason }}
          ENDORCTL_VERSION: ${{ needs.validate-generated-artifacts.outputs.endorctl_version }}
          OPENAPI_SHA256: ${{ needs.validate-generated-artifacts.outputs.openapi_sha256 }}
          OPENAPI_SOURCE_URL: ${{ needs.validate-generated-artifacts.outputs.openapi_source_url }}
          API_SPEC_PATH: ${{ env.OPENAPI_SPEC_PATH }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # actions/checkout already checked out the base branch; creating a new branch at
          # the current HEAD avoids failing on "local changes would be overwritten".
          git checkout -B "$BRANCH_NAME"

          git add src/endorlabs/generated src/endorlabs/client_surface.pyi docs/generated-reference
          git add -f workspace/model-sync
          git reset --quiet -- workspace/model-sync/custom_mapping/provenance.json
          if git diff --cached --quiet; then
            echo "No staged changes after file scope validation; skipping PR update."
            exit 0
          fi

          git commit -m "chore: sync generated model artifacts"
          git push -u origin "$BRANCH_NAME" --force-with-lease
          echo "::notice::PR creation is disabled in this workflow. Rolling branch updated for manual PR: $BRANCH_NAME"

      - name: Cleanup stale model-sync branches
        id: cleanup
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TTL_DAYS: ${{ env.CLEANUP_TTL_DAYS }}
          KEEP_LAST_N: ${{ env.CLEANUP_KEEP_LAST_N }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          STABLE_BRANCH="chore/model-sync-auto"
          TS_REGEX='^chore/model-sync-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{6}$'

          OPEN_PR_HEADS=$(gh pr list --state open --limit 200 --json headRefName --jq '.[].headRefName' || true)
          mapfile -t ALL_BRANCHES < <(gh api --paginate "repos/$REPO/branches?per_page=100" --jq '.[].name' || true)

          if [ ${#ALL_BRANCHES[@]} -eq 0 ]; then
            echo "deleted_count=0" >> "$GITHUB_OUTPUT"
            echo "skipped_count=0" >> "$GITHUB_OUTPUT"
            echo "deleted_branches=" >> "$GITHUB_OUTPUT"
            echo "skipped_branches=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t SORTED_BRANCHES < <(printf "%s\n" "${ALL_BRANCHES[@]}" | sort -r)

          DELETED=""
          SKIPPED=""
          for BRANCH in "${SORTED_BRANCHES[@]}"; do
            if [ "$BRANCH" = "$STABLE_BRANCH" ]; then
              SKIPPED="${SKIPPED}${BRANCH} (protected:stable-branch)\n"
              continue
            fi

            if ! [[ "$BRANCH" =~ $TS_REGEX ]]; then
              SKIPPED="${SKIPPED}${BRANCH} (protected:non-timestamp)\n"
              continue
            fi

            if printf "%s\n" "$OPEN_PR_HEADS" | grep -Fx "$BRANCH" > /dev/null; then
              SKIPPED="${SKIPPED}${BRANCH} (protected:open-pr)\n"
              continue
            fi

            if gh api -X DELETE "repos/$REPO/git/refs/heads/$BRANCH" > /dev/null 2>&1; then
              DELETED="${DELETED}${BRANCH}\n"
            else
              SKIPPED="${SKIPPED}${BRANCH} (skip:delete-failed)\n"
            fi
          done

          DELETED_COUNT=$(printf "%b" "$DELETED" | sed '/^$/d' | wc -l | tr -d ' ')
          SKIPPED_COUNT=$(printf "%b" "$SKIPPED" | sed '/^$/d' | wc -l | tr -d ' ')
          echo "deleted_count=$DELETED_COUNT" >> "$GITHUB_OUTPUT"
          echo "skipped_count=$SKIPPED_COUNT" >> "$GITHUB_OUTPUT"
          echo "deleted_branches<<EOF" >> "$GITHUB_OUTPUT"
          printf "%b" "$DELETED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "skipped_branches<<EOF" >> "$GITHUB_OUTPUT"
          printf "%b" "$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish Workflow Summary
        if: always()
        run: |
          {
            echo "## Model Sync PR Summary"
            echo ""
            echo "### At a glance"
            echo "- OpenAPI SHA256 (previous → current): \`${{ needs.validate-generated-artifacts.outputs.prev_openapi_sha256 || '<none>' }}\` → \`${{ needs.validate-generated-artifacts.outputs.openapi_sha256 }}\`"
            echo "- Download generated outputs from this run: artifact **model-sync-generated**"
            echo "- Rolling branch for manual PR: \`chore/model-sync-auto\`"
            echo "- \`generated_changed\`: \`${{ steps.diff_scope.outputs.generated_changed || 'false' }}\`"
            echo "- Changed file count: \`${{ steps.diff_scope.outputs.changed_count || '0' }}\`"
            echo ""
            echo "### Upstream (OpenAPI operations)"
            if [ -n "${{ steps.upstream_delta.outputs.summary_markdown || '' }}" ]; then
              printf "%s\n" "${{ steps.upstream_delta.outputs.summary_markdown }}"
            else
              echo "_Upstream delta step did not run or produced no output._"
            fi
            echo ""
            echo "### Resources and payloads"
            if [ -n "${{ steps.resource_delta.outputs.summary_markdown || '' }}" ]; then
              printf "%s\n" "${{ steps.resource_delta.outputs.summary_markdown }}"
            else
              echo "_No resource façade or payload markdown (step skipped or empty)._"
            fi
            echo ""
            echo "### Provenance"
            if [ -n "${{ steps.provenance_delta.outputs.summary_markdown || '' }}" ]; then
              printf "%s\n" "${{ steps.provenance_delta.outputs.summary_markdown }}"
            else
              echo "_Provenance delta step did not run or provenance unchanged vs baseline._"
            fi
            echo ""
            echo "### Regenerated reference docs"
            echo "- \`docs/generated-reference/resources.md\`"
            echo "- \`docs/generated-reference/api-surfaces.md\`"
            echo "- \`docs/generated-reference/create-update-payloads.md\`"
            echo "- \`docs/generated-reference/coverage.json\`"
            echo ""
            echo "### Run context"
            echo "| Signal | Value |"
            echo "|---|---|"
            echo "| Event | \`${{ github.event_name }}\` |"
            echo "| Ref | \`${{ github.ref }}\` |"
            echo "| Trigger reason | \`${{ needs.validate-generated-artifacts.outputs.reason }}\` |"
            echo "| Upstream changed | \`${{ needs.validate-generated-artifacts.outputs.upstream_changed }}\` |"
            echo "| version_changed | \`${{ needs.validate-generated-artifacts.outputs.version_changed }}\` |"
            echo "| spec_changed | \`${{ needs.validate-generated-artifacts.outputs.spec_changed }}\` |"
            echo "| Previous endorctl (detector cache) | \`${{ needs.validate-generated-artifacts.outputs.prev_endorctl_version || '<none>' }}\` |"
            echo "| endorctl version (API) | \`${{ needs.validate-generated-artifacts.outputs.endorctl_version }}\` |"
            echo "| Repo baseline endorctl (\`registry_contract\`) | \`${{ needs.validate-generated-artifacts.outputs.repo_baseline_endorctl || '<none>' }}\` |"
            echo "| Repo baseline spec SHA256 (\`registry_contract\`) | \`${{ needs.validate-generated-artifacts.outputs.repo_baseline_spec_sha256 || '<none>' }}\` |"
            echo "| provenance_changed (excluded from branch) | \`${{ steps.diff_scope.outputs.provenance_changed || 'false' }}\` |"
            echo "| API spec path | \`${{ env.OPENAPI_SPEC_PATH }}\` |"
            echo ""
            echo "### Morning Workflow"
            echo "- Review changes on \`chore/model-sync-auto\`."
            echo "- Open a PR to your target base branch directly from the GitHub UI."
            echo "- Legacy timestamp branches are pruned automatically unless they back an open PR."
          } >> "$GITHUB_STEP_SUMMARY"
