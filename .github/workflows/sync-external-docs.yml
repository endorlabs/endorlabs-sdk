name: Sync External Documentation

on:
  schedule:
    # Run weekly on Mondays at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:  # Allow manual triggering

jobs:
  sync-docs:
    name: Sync External Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
          install-dependencies: "false"

      - name: Install documentation dependencies
        run: |
          uv sync --dev --extra docs

      - name: Update Documentation
        run: |
          uv run python scripts/unified_docs_workflow.py \
            --update-docs-only \
            --download-openapi \
            --download-user-docs \
            --max-pages 100
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add external_docs/
          git diff --staged --quiet || git commit -m "chore: Update external documentation [skip ci]"
          git push

