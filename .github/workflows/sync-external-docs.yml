name: Sync External Documentation

on:
  schedule:
    # Run weekly on Mondays at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:  # Allow manual triggering

jobs:
  sync-docs:
    name: Sync External Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.13"

      - name: Install UV
        uses: astral-sh/setup-uv@v3.0.0
        with:
          version: "0.9.3"

      - name: Install dependencies
        run: |
          uv pip install -e ".[docs]"

      - name: Download OpenAPI Spec
        run: |
          python scripts/sync_external_docs.py --download-openapi
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}

      - name: Download User Documentation
        run: |
          python scripts/sync_external_docs.py --download-user-docs --max-pages 100

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add external_docs/
          git diff --staged --quiet || git commit -m "chore: Update external documentation [skip ci]"
          git push

