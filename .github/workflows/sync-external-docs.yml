name: Sync External Documentation

# Scheduled sync disabled in main CI; full sync is for a personal branch or manual run (workflow_dispatch).
on:
  workflow_dispatch:

jobs:
  sync-docs:
    name: Sync External Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"

      - name: Install documentation dependencies
        run: |
          uv sync --dev --extra docs

      - name: Validate documentation dependencies
        run: |
          echo "Validating documentation dependencies are installed..."
          python -c "import bs4; print(f'✅ beautifulsoup4 {bs4.__version__}')" || (echo "❌ beautifulsoup4 not found" && exit 1)
          python -c "import markdownify; print(f'✅ markdownify installed')" || (echo "❌ markdownify not found" && exit 1)
          python -c "import requests; print(f'✅ requests {requests.__version__}')" || (echo "❌ requests not found" && exit 1)
          echo "✅ All documentation dependencies are installed"

      - name: Update Documentation
        run: |
          uv run python .github/scripts/unified_docs_workflow.py \
            --update-docs-only \
            --download-openapi \
            --download-user-docs \
            --max-pages 100
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}

      - name: Upload external_docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: external_docs-${{ github.run_id }}
          path: external_docs/
          retention-days: 7
