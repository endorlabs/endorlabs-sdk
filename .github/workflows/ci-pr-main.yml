name: CI PR Main

# Required Repository Configuration:
# Variables (Settings > Secrets and variables > Actions > Variables):
#   - ENDOR_API: Endor Labs API endpoint (e.g., "https://api.endorlabs.com")
#   - ENDOR_NAMESPACE: Endor namespace for CI (e.g., "endor-solutions-tgowan")
# Secrets (Settings > Secrets and variables > Actions > Secrets):
#   - ENDOR_API_CREDENTIALS_KEY: API credentials key (integration tests only)
#   - ENDOR_API_CREDENTIALS_SECRET: API credentials secret (integration tests only)
# Security: This repo is scanned by the Endor Labs app integration.
#
# Noop strategy (first principles — a job runs only when its inputs change):
#   Layer 1: paths-ignore skips the entire workflow for universal noops (docs, IDE config, etc.).
#   Layer 2: detect-changes categorises changed paths; downstream jobs check their category.
#   Layer 3: ci-success gate job is the single required status check for branch protection.

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '.cursor/**'
      - '.github/CODEOWNERS'
      - '.github/copilot-instructions.md'
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - 'docs/**'
      - 'AGENTS.md'
      - 'CONTRIBUTORS.md'
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches: [ main, dev ]
    paths-ignore:
      - '.cursor/**'
      - '.github/CODEOWNERS'
      - '.github/copilot-instructions.md'
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - 'docs/**'
      - 'AGENTS.md'
      - 'CONTRIBUTORS.md'
      - 'README.md'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests"
        required: false
        default: true
        type: boolean
      force_all:
        description: "Force all CI categories to run"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      run_integration:
        description: "Run integration tests"
        required: false
        default: true
        type: boolean
      force_all:
        description: "Force all CI categories to run"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [remote-ci]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  # CI Configuration - easily maintainable environment variables
  PYTHON_VERSION: "3.13"
  PYTHON_VERSIONS: '["3.13"]'
  PYTEST_MAXFAIL: "2"
  COVERAGE_PACKAGE: "endorlabs"
  UV_VERSION: "0.9.3"
  VERIFYTYPES_RATCHET_MODE: "observe"
  VERIFYTYPES_MIN_COMPLETENESS: "0.0"

  # Action versions - pinned for security
  ACTIONS_CHECKOUT_VERSION: "v6.0.3"

jobs:
  # ---------------------------------------------------------------------------
  # Change detection — categorise which paths changed so downstream jobs can
  # skip when their inputs are unaffected.  Uses only git + grep (no external
  # actions).  Runs in parallel with resolve-dependencies.
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      unit-tests: ${{ steps.changes.outputs.unit-tests }}
      integration-tests: ${{ steps.changes.outputs.integration-tests }}
      config: ${{ steps.changes.outputs.config }}
      ci: ${{ steps.changes.outputs.ci }}
      python: ${{ steps.changes.outputs.python }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # full history for accurate diff

      - name: Detect changed paths
        id: changes
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          FORCE_ALL: ${{ inputs.force_all || github.event.inputs.force_all || github.event.client_payload.force_all || 'false' }}
        run: |
          set -euo pipefail

          if [ "$FORCE_ALL" = "true" ]; then
            for cat in src unit-tests integration-tests config ci python; do
              echo "${cat}=true" >> "$GITHUB_OUTPUT"
            done
            echo "::notice::Force-all set; running all CI categories"
            exit 0
          fi

          # --- resolve base commit ------------------------------------------------
          BASE=""
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            BASE="$PUSH_BEFORE_SHA"
            # initial branch push has all-zero sha
            if [[ "$BASE" =~ ^0+$ ]]; then
              BASE=""
            fi
          fi
          # workflow_dispatch/repository_dispatch/workflow_call:
          # BASE stays empty → fail open (all true)

          # --- collect changed files ----------------------------------------------
          CHANGED=""
          if [ -n "$BASE" ]; then
            CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || true)
          fi

          # --- fail open: if we cannot determine changes, run everything ----------
          if [ -z "$CHANGED" ]; then
            for cat in src unit-tests integration-tests config ci python; do
              echo "${cat}=true" >> "$GITHUB_OUTPUT"
            done
            echo "::notice::Could not determine changed files; assuming all categories changed"
            exit 0
          fi

          # --- helper: set output to true/false based on grep pattern -------------
          check_paths() {
            local name="$1"
            local pattern="$2"
            if echo "$CHANGED" | grep -qE "$pattern"; then
              echo "${name}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${name}=false" >> "$GITHUB_OUTPUT"
            fi
          }

          check_paths "src"               '^src/'
          check_paths "unit-tests"        '^tests/(unit/|conftest\.py$|__init__\.py$)|^agent-knowledge/|^src/endorlabs/agent_knowledge/'
          check_paths "integration-tests" '^tests/(integration/|conftest\.py$|__init__\.py$)'
          check_paths "config"            '^(pyproject\.toml|uv\.lock)$'
          check_paths "ci"                '^\.github/(workflows/|actions/|scripts/)'
          check_paths "python"            '\.py$'

          # --- log summary --------------------------------------------------------
          echo "::group::Change detection summary"
          echo "Changed files:"
          echo "$CHANGED"
          echo ""
          grep '=' "$GITHUB_OUTPUT" || true
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Dependency resolution — runs once and caches dependencies.
  # Runs in parallel with detect-changes.
  # ---------------------------------------------------------------------------
  resolve-dependencies:
    name: Resolve and Cache Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

  # ---------------------------------------------------------------------------
  # Lint — runs when any Python file, config, or CI definition changed.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint, Typecheck, and Verify Generated Artifacts
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, detect-changes]
    if: >-
      needs.detect-changes.outputs.python == 'true' ||
      needs.detect-changes.outputs.config == 'true' ||
      needs.detect-changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Run ruff linter
        run: |
          uv run ruff check .

      - name: Run ruff formatter check
        run: |
          uv run ruff format --check .

      - name: Run pyright
        run: |
          uv run pyright --project pyproject.toml

      - name: Verify ship artifacts (model-sync, stub, reference docs, agent knowledge)
        run: |
          uv run python devtools/ship/verify_ship_artifacts.py --fetch-spec

      # Keep script list aligned with .pre-commit-config.yaml (ruff-check-ci-critical-automation / pyright-ci-critical-automation).
      - name: Validate CI-critical automation scripts
        run: |
          uv run ruff check --select E,F,I,UP devtools/codegen/model_sync.py devtools/codegen/generate_client_stub.py devtools/codegen/generate_reference_docs.py devtools/codegen/sync_agent_knowledge.py devtools/codegen/agent_knowledge_catalog.py devtools/codegen/sync/cli.py devtools/codegen/sync/upstream_verify.py devtools/ship/verify_ship_artifacts.py devtools/precommit/git_staged.py devtools/precommit/pre_commit_guards.py .github/scripts/check_endorctl_version.py
          uv run pyright --project pyproject.toml devtools/codegen/model_sync.py devtools/codegen/generate_client_stub.py devtools/codegen/generate_reference_docs.py devtools/codegen/sync_agent_knowledge.py devtools/codegen/agent_knowledge_catalog.py devtools/codegen/sync/cli.py devtools/codegen/sync/upstream_verify.py devtools/ship/verify_ship_artifacts.py devtools/precommit/git_staged.py devtools/precommit/pre_commit_guards.py .github/scripts/check_endorctl_version.py

      - name: Run pyright verifytypes (public API type completeness)
        continue-on-error: true  # Non-blocking verifytypes ratchet (see docs/reference/README.md)
        id: verifytypes
        run: |
          set -euo pipefail
          OUT_FILE="$(mktemp)"
          # Keep this step non-blocking while we ratchet in a follow-up step.
          uv run pyright --verifytypes endorlabs --ignoreexternal --project pyproject.toml | tee "$OUT_FILE"
          SCORE=$(python -c "import pathlib,re,sys; text=pathlib.Path(sys.argv[1]).read_text(encoding='utf-8', errors='replace'); m=re.search(r'Type completeness score:\\s*([0-9]+(?:\\.[0-9]+)?)%?', text); print(m.group(1) if m else '')" "$OUT_FILE")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: Enforce verifytypes ratchet
        if: always()
        run: |
          set -euo pipefail
          SCORE="${{ steps.verifytypes.outputs.score }}"
          MODE="${{ env.VERIFYTYPES_RATCHET_MODE }}"
          MIN="${{ env.VERIFYTYPES_MIN_COMPLETENESS }}"
          if [ -z "$SCORE" ]; then
            echo "::warning::verifytypes score could not be parsed; skipping ratchet enforcement."
            exit 0
          fi

          python -c "import sys; score=float(sys.argv[1]); minimum=float(sys.argv[2]); mode=sys.argv[3]; print(f'verifytypes completeness score: {score:.2f}% (mode={mode}, min={minimum:.2f}%)'); raise SystemExit(1 if mode == 'enforce' and score < minimum else 0)" "$SCORE" "$MIN" "$MODE"

  # ---------------------------------------------------------------------------
  # Unit tests + coverage — committed generated ship surface (validated in lint via verify_ship_artifacts).
  # Domain buckets live under tests/unit/{client,workflows,platform,tooling}.
  # Runs when src/, unit test files, config, or CI definition changed.
  # Note: lint conditions are a superset of unit-test conditions, so lint
  # is never skipped when this job needs to run — no always() required.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, lint, detect-changes]
    if: >-
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.unit-tests == 'true' ||
      needs.detect-changes.outputs.config == 'true' ||
      needs.detect-changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ --cov=${{ env.COVERAGE_PACKAGE }} --cov-report=xml --cov-report=term-missing --maxfail=${{ env.PYTEST_MAXFAIL }} -m "not interactive and not long"

      - name: Display coverage summary
        run: |
          echo "Coverage report generated successfully"
          echo "Coverage data available in coverage.xml"
          echo "View detailed coverage with: uv run pytest tests/unit/ --cov=${{ env.COVERAGE_PACKAGE }} --cov-report=html"

  # ---------------------------------------------------------------------------
  # Integration tests — slower, requires secrets.
  # Domain buckets live under tests/integration/{client,resources,workflows}.
  # Uses always() because unit-tests may be correctly skipped (e.g. only
  # integration test files changed) while this job still needs to run.
  #
  # Do not gate on `inputs.* == false` / `!= false` for pull_request/push:
  # unset inputs are null/'' and Actions loose-equality treats those as equal
  # to false. PR/push always eligible (path filters below); dispatch/call/opt
  # out only when the input is explicitly false.
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Test Suite
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, lint, unit-tests, detect-changes]
    if: >-
      always() &&
      !cancelled() &&
      needs.resolve-dependencies.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      needs.unit-tests.result != 'failure' &&
      (
        github.event_name == 'pull_request' ||
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.run_integration) ||
        (github.event_name == 'workflow_call' && inputs.run_integration) ||
        (
          github.event_name == 'repository_dispatch' &&
          github.event.client_payload.run_integration != 'false'
        )
      ) &&
      (
        needs.detect-changes.outputs.src == 'true' ||
        needs.detect-changes.outputs.integration-tests == 'true' ||
        needs.detect-changes.outputs.config == 'true' ||
        needs.detect-changes.outputs.ci == 'true'
      ) &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Validate required secrets for integration tests
        run: |
          if [ -z "${{ vars.ENDOR_API }}" ]; then
            echo "ERROR: ENDOR_API variable is not set"
            echo "Please configure the ENDOR_API variable in repository settings"
            exit 1
          fi
          if [ -z "${{ vars.ENDOR_NAMESPACE }}" ]; then
            echo "ERROR: ENDOR_NAMESPACE variable is not set"
            echo "Please configure the ENDOR_NAMESPACE variable in repository settings"
            exit 1
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_KEY }}" ]; then
            echo "ERROR: ENDOR_API_CREDENTIALS_KEY secret is not set"
            echo "Please configure the ENDOR_API_CREDENTIALS_KEY secret in repository settings"
            exit 1
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}" ]; then
            echo "ERROR: ENDOR_API_CREDENTIALS_SECRET secret is not set"
            echo "Please configure the ENDOR_API_CREDENTIALS_SECRET secret in repository settings"
            exit 1
          fi
          echo "All required secrets are present"

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ --maxfail=${{ env.PYTEST_MAXFAIL }} --disable-warnings -m "not long"
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}
          # Platform Project meta.name matches the GitHub clone URL for this repo.
          TEST_REPO_URL: https://github.com/${{ github.repository }}.git

  # ---------------------------------------------------------------------------
  # Endor Labs CI security scans (OIDC keyless auth).
  # Fastest feedback first: secrets -> dependencies -> comprehensive SAST/AI SAST.
  # Dependency scans use --quick-scan (no call graph) for faster CI on workflow/docs-only changes.
  # ---------------------------------------------------------------------------
  endorlabs-security-scan:
    name: Endor Labs Security Scan
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, detect-changes]
    if: >-
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.config == 'true' ||
      needs.detect-changes.outputs.ci == 'true' ||
      needs.detect-changes.outputs.python == 'true'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      security-events: write
      checks: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Validate Endor namespace
        run: |
          if [ -z "${{ vars.ENDOR_NAMESPACE }}" ]; then
            echo "ERROR: ENDOR_NAMESPACE must be configured"
            exit 1
          fi

      - name: Sync dependencies for dependency-aware scans
        run: |
          uv sync --dev

      - name: Endor Labs Secrets scan (fast)
        uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946 # v1.1.12
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          scan_summary_output_type: table
          pr: ${{ github.event_name == 'pull_request' }}
          scan_dependencies: false
          scan_secrets: true
          scan_sast: false
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Endor Labs SCA scan
        uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946 # v1.1.12
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          scan_summary_output_type: table
          pr: ${{ github.event_name == 'pull_request' }}
          scan_dependencies: true
          scan_secrets: false
          scan_sast: false
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_args: --quick-scan

      - name: Endor Labs comprehensive SAST + AI SAST scan
        uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946 # v1.1.12
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          scan_summary_output_type: table
          pr: ${{ github.event_name == 'pull_request' }}
          scan_dependencies: true
          scan_secrets: true
          scan_sast: true
          additional_args: --quick-scan
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # CI gate — single required status check for branch protection.
  # Passes when every conditional job either succeeded or was correctly skipped.
  # ---------------------------------------------------------------------------
  ci-success:
    name: Branch Protection CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [detect-changes, resolve-dependencies, lint, unit-tests, test-integration, endorlabs-security-scan]
    steps:
      - name: Verify no failures
        run: |
          required_results=(
            "${{ needs.detect-changes.result }}"
            "${{ needs.resolve-dependencies.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.unit-tests.result }}"
            "${{ needs.test-integration.result }}"
            "${{ needs.endorlabs-security-scan.result }}"
          )
          failed=0
          for result in "${required_results[@]}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Job result: $result"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were correctly skipped"

      - name: Publish CI summary
        if: always()
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "### Run Context"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Actor: \`${{ github.actor }}\`"
            echo ""
            echo "### Outcome Matrix"
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Detect changes | \`${{ needs.detect-changes.result }}\` |"
            echo "| Resolve dependencies | \`${{ needs.resolve-dependencies.result }}\` |"
            echo "| Lint/typecheck | \`${{ needs.lint.result }}\` |"
            echo "| Unit tests and coverage | \`${{ needs.unit-tests.result }}\` |"
            echo "| Integration tests | \`${{ needs.test-integration.result }}\` |"
            echo "| Endor Labs security scan | \`${{ needs.endorlabs-security-scan.result }}\` |"
            echo ""
            echo "### Key Outputs"
            echo "- Path categories: src=\`${{ needs.detect-changes.outputs.src }}\`, unit=\`${{ needs.detect-changes.outputs.unit-tests }}\`, integration=\`${{ needs.detect-changes.outputs.integration-tests }}\`, config=\`${{ needs.detect-changes.outputs.config }}\`, ci=\`${{ needs.detect-changes.outputs.ci }}\`, python=\`${{ needs.detect-changes.outputs.python }}\`"
            echo ""
            echo "### Next Action"
            echo "- If a required row is \`failure\` or \`cancelled\`, fix and re-run this workflow."
          } >> "$GITHUB_STEP_SUMMARY"
