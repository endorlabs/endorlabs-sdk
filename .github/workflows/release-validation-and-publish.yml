name: Release Validation, Build, and Publish

# Triggered when a version tag is pushed (e.g. v0.1.0, v1.0.0-rc.1).
# Builds the package, runs the quality gate, and creates a GitHub Release
# with the wheel and sdist attached.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.9.3"
  ENDOR_GITHUB_ACTION_SHA: "ea13ac38613bbf08ee75ec21ddec172e648976b7" # endorlabs/github-action v1.1.11

jobs:
  release:
    name: Validate, Build, and Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # full history for hatch-vcs version derivation

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@v7.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run pytest tests/unit/ -x -m "not slow and not long"

      - name: Download OpenAPI spec for model sync
        run: |
          mkdir -p .endorlabs-context
          curl -sSfL -o .endorlabs-context/openapiv2.swagger.json https://api.endorlabs.com/download/openapiv2.swagger.json

      - name: Verify canonical model-sync artifacts are up to date
        run: |
          uv run python scripts/model_sync.py
          if [ ! -f workspace/model-sync/custom_mapping/mapping/entity_mapping.json ]; then
            echo "::error::Model-sync mapping manifest was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/provenance.json ]; then
            echo "::error::Model-sync provenance metadata was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/artifacts_manifest.json ]; then
            echo "::error::Model-sync artifacts manifest was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/facade_contract.json ]; then
            echo "::error::Model-sync facade contract was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/mapping/registry_parity_report.json ]; then
            echo "::error::Model-sync registry parity report was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/mapping/operation_path_metadata.json ]; then
            echo "::error::Model-sync operation metadata was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/mapping/payload_schemas.json ]; then
            echo "::error::Model-sync payload schema metadata was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/mapping/runtime_index.json ]; then
            echo "::error::Model-sync runtime index metadata was not generated."
            exit 1
          fi
          if [ ! -f src/endorlabs/generated/models/__init__.py ]; then
            echo "::error::Runtime generated model package was not generated."
            exit 1
          fi

      - name: Verify generated client stub is up to date
        run: |
          uv run python scripts/generate_client_stub.py
          if ! git diff --exit-code -- src/endorlabs/client_surface.pyi; then
            echo "::error::client_surface.pyi is out of date. Run: uv run python scripts/generate_client_stub.py"
            git --no-pager diff -- src/endorlabs/client_surface.pyi
            exit 1
          fi

      - name: Verify generated reference docs are up to date
        run: |
          uv run python scripts/generate_reference_docs.py
          if ! git diff --exit-code -- docs/generated-reference/resources.md docs/generated-reference/create-update-payloads.md docs/generated-reference/api-surfaces.md docs/generated-reference/coverage.json; then
            echo "::error::Reference docs are out of date. Run: uv run python scripts/generate_reference_docs.py"
            git --no-pager diff -- docs/generated-reference/resources.md docs/generated-reference/create-update-payloads.md docs/generated-reference/api-surfaces.md docs/generated-reference/coverage.json
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Verify build artifacts
        run: |
          echo "Build artifacts:"
          ls -la dist/

      - name: Validate Endor OIDC prerequisites
        run: |
          if [ -z "${{ vars.ENDOR_NAMESPACE }}" ]; then
            echo "::error::ENDOR_NAMESPACE variable is required for release artifact signing."
            exit 1
          fi

      - name: Set up Endor Labs OIDC auth
        uses: endorlabs/github-action/setup@ea13ac38613bbf08ee75ec21ddec172e648976b7
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}

      - name: Validate GitHub OIDC auth policy
        run: |
          set -euo pipefail
          POLICY_JSON="$(endorctl api list -r AuthorizationPolicy -n "${{ vars.ENDOR_NAMESPACE }}" --traverse)"
          MATCH_COUNT="$(echo "$POLICY_JSON" | jq --arg policy_name "github-oidc-code-scanner" --arg claim "user=${{ github.repository_owner }}" --arg namespace "${{ vars.ENDOR_NAMESPACE }}" '[.list.objects[]? | select(.meta.name == $policy_name) | select((.spec.permissions.roles // []) | index("SYSTEM_ROLE_CODE_SCANNER")) | select((.spec.clause // []) | index($claim)) | select((.spec.target_namespaces // []) | index($namespace)) | select(.spec.propagate == true)] | length')"
          if [ "$MATCH_COUNT" -lt 1 ]; then
            echo "::error::Missing or mismatched OIDC authorization policy. Expected policy=github-oidc-code-scanner claim=user=${{ github.repository_owner }} role=SYSTEM_ROLE_CODE_SCANNER target=${{ vars.ENDOR_NAMESPACE }} propagate=true"
            exit 1
          fi
          echo "OIDC policy validation passed."

      - name: Compute release artifact reference
        id: release_artifact
        run: |
          set -euo pipefail
          WHEEL="$(ls dist/*.whl | head -n 1)"
          SHA256="$(sha256sum "$WHEEL" | awk '{print $1}')"
          ARTIFACT_NAME="github.com/${{ github.repository }}/python-wheel@sha256:${SHA256}"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "source_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          echo "wheel_path=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "Release artifact: $ARTIFACT_NAME"

      - name: Sign release artifact with Endor Labs
        uses: endorlabs/github-action/sign@ea13ac38613bbf08ee75ec21ddec172e648976b7
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          artifact_name: ${{ steps.release_artifact.outputs.artifact_name }}
          source_repository_ref: ${{ steps.release_artifact.outputs.source_ref }}
          certificate_oidc_issuer: "https://token.actions.githubusercontent.com"

      - name: Verify release artifact signature
        uses: endorlabs/github-action/verify@ea13ac38613bbf08ee75ec21ddec172e648976b7
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          artifact_name: ${{ steps.release_artifact.outputs.artifact_name }}
          certificate_oidc_issuer: "https://token.actions.githubusercontent.com"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
