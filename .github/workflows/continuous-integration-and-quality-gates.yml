name: Continuous Integration and Quality Gates

# Required Repository Configuration:
# Variables (Settings > Secrets and variables > Actions > Variables):
#   - ENDOR_API: Endor Labs API endpoint (e.g., "https://api.endorlabs.com")
#   - ENDOR_NAMESPACE: Endor namespace for CI (e.g., "endor-solutions-tgowan")
# Secrets (Settings > Secrets and variables > Actions > Secrets):
#   - ENDOR_API_CREDENTIALS_KEY: API credentials key (for integration tests + AI security review)
#   - ENDOR_API_CREDENTIALS_SECRET: API credentials secret (for integration tests + AI security review)
# Security: This repo is scanned by the Endor Labs app integration.
# AI Security Code Review: Runs on PRs via endorctl --security-review (uses GITHUB_TOKEN for PR comments).
#
# Noop strategy (first principles — a job runs only when its inputs change):
#   Layer 1: paths-ignore skips the entire workflow for universal noops (docs, IDE config, etc.).
#   Layer 2: detect-changes categorises changed paths; downstream jobs check their category.
#   Layer 3: ci-success gate job is the single required status check for branch protection.

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - '.cursor/**'
      - '.github/CODEOWNERS'
      - '.github/copilot-instructions.md'
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    # Includes automation PRs from chore/model-sync-auto -> main/dev.
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - '.cursor/**'
      - '.github/CODEOWNERS'
      - '.github/copilot-instructions.md'
      - '.gitignore'
      - '.pre-commit-config.yaml'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run integration tests"
        required: false
        default: true
        type: boolean
      force_all:
        description: "Force all CI categories to run"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      run_integration:
        description: "Run integration tests"
        required: false
        default: true
        type: boolean
      force_all:
        description: "Force all CI categories to run"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [remote-ci]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI Configuration - easily maintainable environment variables
  PYTHON_VERSION: "3.13"
  PYTHON_VERSIONS: '["3.13"]'
  PYTEST_MAXFAIL: "2"
  COVERAGE_PACKAGE: "endorlabs"
  UV_VERSION: "0.9.3"
  
  # Action versions - pinned for security
  ACTIONS_CHECKOUT_VERSION: "v6.0.2"
  ACTIONS_SETUP_PYTHON_VERSION: "v6.2.0"
  ACTIONS_CACHE_VERSION: "v5.0.2"
  ASTRAL_SETUP_UV_VERSION: "v7.2.0"

jobs:
  # ---------------------------------------------------------------------------
  # Change detection — categorise which paths changed so downstream jobs can
  # skip when their inputs are unaffected.  Uses only git + grep (no external
  # actions).  Runs in parallel with resolve-dependencies.
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      unit-tests: ${{ steps.changes.outputs.unit-tests }}
      integration-tests: ${{ steps.changes.outputs.integration-tests }}
      config: ${{ steps.changes.outputs.config }}
      ci: ${{ steps.changes.outputs.ci }}
      python: ${{ steps.changes.outputs.python }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # full history for accurate diff

      - name: Detect changed paths
        id: changes
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          FORCE_ALL: ${{ inputs.force_all || github.event.inputs.force_all || github.event.client_payload.force_all || 'false' }}
        run: |
          set -euo pipefail

          if [ "$FORCE_ALL" = "true" ]; then
            for cat in src unit-tests integration-tests config ci python; do
              echo "${cat}=true" >> "$GITHUB_OUTPUT"
            done
            echo "::notice::Force-all set; running all CI categories"
            exit 0
          fi

          # --- resolve base commit ------------------------------------------------
          BASE=""
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            BASE="$PUSH_BEFORE_SHA"
            # initial branch push has all-zero sha
            if [[ "$BASE" =~ ^0+$ ]]; then
              BASE=""
            fi
          fi
          # workflow_dispatch/repository_dispatch/workflow_call:
          # BASE stays empty → fail open (all true)

          # --- collect changed files ----------------------------------------------
          CHANGED=""
          if [ -n "$BASE" ]; then
            CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || true)
          fi

          # --- fail open: if we cannot determine changes, run everything ----------
          if [ -z "$CHANGED" ]; then
            for cat in src unit-tests integration-tests config ci python; do
              echo "${cat}=true" >> "$GITHUB_OUTPUT"
            done
            echo "::notice::Could not determine changed files; assuming all categories changed"
            exit 0
          fi

          # --- helper: set output to true/false based on grep pattern -------------
          check_paths() {
            local name="$1"
            local pattern="$2"
            if echo "$CHANGED" | grep -qE "$pattern"; then
              echo "${name}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${name}=false" >> "$GITHUB_OUTPUT"
            fi
          }

          check_paths "src"               '^src/'
          check_paths "unit-tests"        '^tests/(unit/|conftest\.py$|__init__\.py$)'
          check_paths "integration-tests" '^tests/(integration/|conftest\.py$|__init__\.py$)'
          check_paths "config"            '^(pyproject\.toml|uv\.lock)$'
          check_paths "ci"                '^\.github/(workflows/|actions/|scripts/)'
          check_paths "python"            '\.py$'

          # --- log summary --------------------------------------------------------
          echo "::group::Change detection summary"
          echo "Changed files:"
          echo "$CHANGED"
          echo ""
          grep '=' "$GITHUB_OUTPUT" || true
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Dependency resolution — runs once and caches dependencies.
  # Runs in parallel with detect-changes.
  # ---------------------------------------------------------------------------
  resolve-dependencies:
    name: Resolve and Cache Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/pyproject.toml') }}" >> $GITHUB_OUTPUT

      - name: Cache UV dependencies
        uses: actions/cache@v5.0.2
        with:
          path: ~/.cache/uv
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-uv-


      - name: Install UV
        uses: astral-sh/setup-uv@v7.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: |
          uv sync --dev

  # ---------------------------------------------------------------------------
  # Lint — runs when any Python file, config, or CI definition changed.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint, Typecheck, and Verify Generated Artifacts
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, detect-changes]
    if: >-
      needs.detect-changes.outputs.python == 'true' ||
      needs.detect-changes.outputs.config == 'true' ||
      needs.detect-changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache-key: ${{ needs.resolve-dependencies.outputs.cache-key }}

      - name: Run ruff linter
        run: |
          uv run ruff check .

      - name: Run ruff formatter check
        run: |
          uv run ruff format --check .

      - name: Run pyright
        run: |
          uv run pyright --project pyproject.toml

      - name: Validate CI-critical automation scripts
        run: |
          uv run ruff check --select E,F,I,UP scripts/model_sync.py scripts/generate_client_stub.py scripts/generate_reference_docs.py .github/scripts/check_endorctl_version.py
          uv run pyright --project pyproject.toml scripts/model_sync.py scripts/generate_client_stub.py scripts/generate_reference_docs.py .github/scripts/check_endorctl_version.py

      - name: Download OpenAPI spec for model sync
        run: |
          mkdir -p .endorlabs-context
          curl -sSfL -o .endorlabs-context/openapiv2.swagger.json https://api.endorlabs.com/download/openapiv2.swagger.json

      - name: Verify canonical model-sync artifacts are up to date
        run: |
          uv run python scripts/model_sync.py
          if [ ! -f workspace/model-sync/custom_mapping/mapping/entity_mapping.json ]; then
            echo "::error::Model-sync mapping manifest was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/provenance.json ]; then
            echo "::error::Model-sync provenance metadata was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/artifacts_manifest.json ]; then
            echo "::error::Model-sync artifacts manifest was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/facade_contract.json ]; then
            echo "::error::Model-sync facade contract was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/mapping/registry_parity_report.json ]; then
            echo "::error::Model-sync registry parity report was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/mapping/operation_path_metadata.json ]; then
            echo "::error::Model-sync operation metadata was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/mapping/payload_schemas.json ]; then
            echo "::error::Model-sync payload schema metadata was not generated."
            exit 1
          fi
          if [ ! -f workspace/model-sync/custom_mapping/mapping/runtime_index.json ]; then
            echo "::error::Model-sync runtime index metadata was not generated."
            exit 1
          fi
          if [ ! -f src/endorlabs/generated/models/__init__.py ]; then
            echo "::error::Runtime generated model package was not generated."
            exit 1
          fi

      - name: Verify generated client stub is up to date
        run: |
          uv run python scripts/generate_client_stub.py
          if ! git diff --exit-code -- src/endorlabs/client_surface.pyi; then
            echo "::error::client_surface.pyi is out of date. Run: uv run python scripts/generate_client_stub.py"
            git --no-pager diff -- src/endorlabs/client_surface.pyi
            exit 1
          fi

      - name: Verify generated reference docs are up to date
        run: |
          uv run python scripts/generate_reference_docs.py
          if ! git diff --exit-code -- docs/generated-reference/resources.md docs/generated-reference/create-update-payloads.md docs/generated-reference/api-surfaces.md docs/generated-reference/coverage.json; then
            echo "::error::Reference docs are out of date. Run: uv run python scripts/generate_reference_docs.py"
            git --no-pager diff -- docs/generated-reference/resources.md docs/generated-reference/create-update-payloads.md docs/generated-reference/api-surfaces.md docs/generated-reference/coverage.json
            exit 1
          fi

      - name: Run pyright verifytypes (public API type completeness)
        continue-on-error: true  # Remove when type completeness is 100% (see docs/reference/README.md)
        run: |
          uv run pyright --verifytypes endorlabs --ignoreexternal --project pyproject.toml

  # ---------------------------------------------------------------------------
  # Unit tests — fast, no secrets required.
  # Domain buckets live under tests/unit/{client,workflows,platform,tooling}.
  # Runs when src/, unit test files, config, or CI definition changed.
  # Note: lint conditions are a superset of unit-test conditions, so lint
  # is never skipped when this job needs to run — no always() required.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Test Suite
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, lint, detect-changes]
    if: >-
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.unit-tests == 'true' ||
      needs.detect-changes.outputs.config == 'true' ||
      needs.detect-changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache-key: ${{ needs.resolve-dependencies.outputs.cache-key }}

      - name: Download OpenAPI spec for unit contract checks
        run: |
          mkdir -p .endorlabs-context
          curl -sSfL -o .endorlabs-context/openapiv2.swagger.json https://api.endorlabs.com/download/openapiv2.swagger.json

      - name: Generate canonical model-sync artifacts for unit tests
        run: |
          uv run python scripts/model_sync.py

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ --maxfail=${{ env.PYTEST_MAXFAIL }} -m "not slow and not long"

  # ---------------------------------------------------------------------------
  # Integration tests — slower, requires secrets.
  # Domain buckets live under tests/integration/{client,resources,workflows}.
  # Uses always() because unit-tests may be correctly skipped (e.g. only
  # integration test files changed) while this job still needs to run.
  # ---------------------------------------------------------------------------
  test-integration:
    name: Integration Test Suite
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, unit-tests, detect-changes]
    if: >-
      always() &&
      !cancelled() &&
      needs.resolve-dependencies.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      needs.unit-tests.result != 'failure' &&
      (inputs.run_integration != false && github.event.inputs.run_integration != 'false' && github.event.client_payload.run_integration != 'false') &&
      (
        needs.detect-changes.outputs.src == 'true' ||
        needs.detect-changes.outputs.integration-tests == 'true' ||
        needs.detect-changes.outputs.config == 'true' ||
        needs.detect-changes.outputs.ci == 'true'
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache-key: ${{ needs.resolve-dependencies.outputs.cache-key }}

      - name: Validate required secrets for integration tests
        run: |
          if [ -z "${{ vars.ENDOR_API }}" ]; then
            echo "ERROR: ENDOR_API variable is not set"
            echo "Please configure the ENDOR_API variable in repository settings"
            exit 1
          fi
          if [ -z "${{ vars.ENDOR_NAMESPACE }}" ]; then
            echo "ERROR: ENDOR_NAMESPACE variable is not set"
            echo "Please configure the ENDOR_NAMESPACE variable in repository settings"
            exit 1
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_KEY }}" ]; then
            echo "ERROR: ENDOR_API_CREDENTIALS_KEY secret is not set"
            echo "Please configure the ENDOR_API_CREDENTIALS_KEY secret in repository settings"
            exit 1
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}" ]; then
            echo "ERROR: ENDOR_API_CREDENTIALS_SECRET secret is not set"
            echo "Please configure the ENDOR_API_CREDENTIALS_SECRET secret in repository settings"
            exit 1
          fi
          echo "All required secrets are present"

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ --maxfail=${{ env.PYTEST_MAXFAIL }} --disable-warnings -m "not long"
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}

  # ---------------------------------------------------------------------------
  # Coverage — runs unit tests only (fast, deterministic).
  # Conditions mirror unit-tests; if unit-tests runs, coverage runs too.
  # ---------------------------------------------------------------------------
  coverage:
    name: Unit Test Coverage Report
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, unit-tests, detect-changes]
    if: >-
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.unit-tests == 'true' ||
      needs.detect-changes.outputs.config == 'true' ||
      needs.detect-changes.outputs.ci == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache-key: ${{ needs.resolve-dependencies.outputs.cache-key }}

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ --cov=${{ env.COVERAGE_PACKAGE }} --cov-report=xml --cov-report=term-missing --maxfail=${{ env.PYTEST_MAXFAIL }} -m "not slow and not long"

      - name: Display coverage summary
        run: |
          echo "Coverage report generated successfully"
          echo "Coverage data available in coverage.xml"
          echo "View detailed coverage with: uv run pytest tests/unit/ --cov=${{ env.COVERAGE_PACKAGE }} --cov-report=html"

  # ---------------------------------------------------------------------------
  # AI Security Code Review — runs on pull requests only (independent of other
  # jobs; not gated by detect-changes since endorctl diffs the PR itself).
  # ---------------------------------------------------------------------------
  ai-security-review:
    name: AI-Assisted Security Code Review
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Evaluate code review prerequisites (fail-open)
        id: review_prereqs
        run: |
          SHOULD_RUN=true
          if [ -z "${{ vars.ENDOR_NAMESPACE }}" ]; then
            echo "::warning::ENDOR_NAMESPACE variable is not set; skipping AI security review."
            SHOULD_RUN=false
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_KEY }}" ]; then
            echo "::warning::ENDOR_API_CREDENTIALS_KEY secret is not set; skipping AI security review."
            SHOULD_RUN=false
          fi
          if [ -z "${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}" ]; then
            echo "::warning::ENDOR_API_CREDENTIALS_SECRET secret is not set; skipping AI security review."
            SHOULD_RUN=false
          fi
          if [ -z "${{ vars.ENDOR_API }}" ]; then
            echo "::warning::ENDOR_API variable is not set; skipping AI security review."
            SHOULD_RUN=false
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          if [ "$SHOULD_RUN" = "true" ]; then
            echo "✅ AI security review prerequisites satisfied."
          fi

      - name: Install endorctl
        if: steps.review_prereqs.outputs.should_run == 'true'
        run: |
          curl -sSfL https://api.endorlabs.com/download/latest/endorctl_linux_amd64 -o endorctl
          chmod +x endorctl
          ./endorctl --version

      - name: Run AI Security Code Review
        if: steps.review_prereqs.outputs.should_run == 'true'
        run: |
          ./endorctl scan \
            --namespace "${{ vars.ENDOR_NAMESPACE }}" \
            --pr \
            --security-review \
            --scm-pr-id "${{ github.event.pull_request.number }}" \
            --scm-token "$GITHUB_TOKEN" \
            --enable-pr-comments \
            --log-level debug \
            --verbose
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review skipped summary
        if: steps.review_prereqs.outputs.should_run != 'true'
        run: |
          echo "AI security code review skipped (fail-open); missing configuration prerequisites."

  # ---------------------------------------------------------------------------
  # CI gate — single required status check for branch protection.
  # Passes when every conditional job either succeeded or was correctly skipped.
  # ---------------------------------------------------------------------------
  ci-success:
    name: Branch Protection CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, unit-tests, test-integration, coverage]
    steps:
      - name: Verify no failures
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.unit-tests.result }}"
            "${{ needs.test-integration.result }}"
            "${{ needs.coverage.result }}"
          )
          failed=0
          for result in "${results[@]}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Job result: $result"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were correctly skipped"

      - name: Publish CI summary
        if: always()
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Lint: \`${{ needs.lint.result }}\`"
            echo "- Unit tests: \`${{ needs.unit-tests.result }}\`"
            echo "- Integration tests: \`${{ needs.test-integration.result }}\`"
            echo "- Coverage: \`${{ needs.coverage.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
