name: Release Tag Publish

# Tag push or workflow_dispatch for final vX.Y.Z release builds.
# Production PyPI: workflow_dispatch with ref=main, publish=true, then approve pypi env.
# Tag push + PYPI_TAG_PUBLISH_ENABLED=true does not publish when pypi env allows protected branches only.
# Default workflow_dispatch publish=false is build-only (dry-run).
# See docs/contributing/release-publishing.md

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "PEP 440 final version (e.g. 0.2.0)"
        required: true
        type: string
      ref:
        description: "Git ref to build from"
        required: false
        default: main
        type: string
      publish:
        description: "Upload to PyPI and create GitHub Release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.9.3"
  UV_INDEX_ENDOR_FIREWALL_USERNAME: ${{ secrets.UV_INDEX_ENDOR_FIREWALL_USERNAME || vars.UV_INDEX_ENDOR_FIREWALL_USERNAME }}
  UV_INDEX_ENDOR_FIREWALL_PASSWORD: ${{ secrets.UV_INDEX_ENDOR_FIREWALL_PASSWORD || vars.UV_INDEX_ENDOR_FIREWALL_PASSWORD }}

jobs:
  classify:
    name: Classify Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.classify.outputs.version }}
      is_final_release: ${{ steps.classify.outputs.is_final_release }}
      publish: ${{ steps.classify.outputs.publish }}
      checkout_ref: ${{ steps.classify.outputs.checkout_ref }}
    steps:
      - name: Classify release version
        id: classify
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            CHECKOUT_REF="${{ inputs.ref }}"
            PUBLISH="${{ inputs.publish }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            CHECKOUT_REF="${GITHUB_REF}"
            if [ "${{ vars.PYPI_TAG_PUBLISH_ENABLED }}" = "true" ]; then
              PUBLISH="true"
            else
              PUBLISH="false"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${CHECKOUT_REF}" >> "$GITHUB_OUTPUT"
          echo "publish=${PUBLISH}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_final_release=true" >> "$GITHUB_OUTPUT"
            echo "Final release: ${VERSION} (publish=${PUBLISH})"
          else
            echo "is_final_release=false" >> "$GITHUB_OUTPUT"
            echo "Non-final version: ${VERSION} — build/publish skipped"
          fi

  build:
    name: Validate, Build, and Upload Artifacts
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.is_final_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.classify.outputs.checkout_ref }}
          fetch-depth: 1

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Run release build gate
        uses: ./.github/actions/release-build-gate
        with:
          version: ${{ needs.classify.outputs.version }}
          fetch-spec: "true"
          verify-changelog: "true"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (OIDC)
    runs-on: ubuntu-latest
    needs: [classify, build]
    if: >-
      needs.classify.outputs.is_final_release == 'true' &&
      needs.classify.outputs.publish == 'true'
    environment: pypi
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI with attestations
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          verbose: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [classify, build, publish-pypi]
    if: >-
      needs.classify.outputs.is_final_release == 'true' &&
      needs.classify.outputs.publish == 'true' &&
      needs.publish-pypi.result == 'success'
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ needs.classify.outputs.version }}
          files: dist/*
          generate_release_notes: true

  post-release-bump:
    name: Push Next Dev Anchor Tag
    runs-on: ubuntu-latest
    needs: [classify, publish-pypi]
    if: >-
      needs.classify.outputs.is_final_release == 'true' &&
      needs.classify.outputs.publish == 'true' &&
      needs.publish-pypi.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Push next dev anchor tag
        run: |
          set -euo pipefail
          VERSION="${{ needs.classify.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}.dev0"
          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Dev anchor tag ${NEXT_TAG} already exists; skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_TAG" -m "Dev anchor after release v${VERSION}"
          git push origin "$NEXT_TAG"
          echo "Pushed dev anchor tag: ${NEXT_TAG}"

  release-summary:
    name: Publish Release Summary
    runs-on: ubuntu-latest
    needs: [classify, build, publish-pypi, github-release, post-release-bump]
    if: always()
    steps:
      - name: Publish release summary
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "### Run Context"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Actor: \`${{ github.actor }}\`"
            echo ""
            echo "### Outcome Matrix"
            echo "| Signal | Value |"
            echo "|---|---|"
            echo "| Version | \`${{ needs.classify.outputs.version }}\` |"
            echo "| Final release | \`${{ needs.classify.outputs.is_final_release }}\` |"
            echo "| Publish requested | \`${{ needs.classify.outputs.publish }}\` |"
            echo "| Build | \`${{ needs.build.result }}\` |"
            echo "| PyPI publish | \`${{ needs.publish-pypi.result }}\` |"
            echo "| GitHub Release | \`${{ needs.github-release.result }}\` |"
            echo "| Dev anchor bump | \`${{ needs.post-release-bump.result }}\` |"
            echo ""
            if [ "${{ needs.classify.outputs.publish }}" != "true" ]; then
              echo "### Dry-run"
              echo "- Build gate and artifacts only; PyPI publish and GitHub Release skipped."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
