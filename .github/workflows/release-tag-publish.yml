name: Release Tag Publish

# Triggered when a PEP 440-compatible version tag is pushed
# (e.g. v0.1.0, v1.0.0rc1). Dev-series anchors use v1.1.0.dev0 only—not v1.1.0.dev19.
# Final release tags (vX.Y.Z) publish to PyPI via OIDC Trusted Publishing.
# See docs/guides/pypi-publication-draft.md for tag policy and PyPI/TestPyPI rollout.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.9.3"

jobs:
  classify:
    name: Classify Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_final_release: ${{ steps.version.outputs.is_final_release }}
    steps:
      - name: Classify tag version
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_final_release=true" >> "$GITHUB_OUTPUT"
            echo "Final release tag: ${TAG} (${VERSION})"
          else
            echo "is_final_release=false" >> "$GITHUB_OUTPUT"
            echo "Non-final tag (dev/pre-release): ${TAG} (${VERSION}) — publish skipped"
          fi

  build:
    name: Validate, Build, and Attach Release
    runs-on: ubuntu-latest
    needs: classify
    if: needs.classify.outputs.is_final_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-version: ${{ env.UV_VERSION }}

      - name: Set release version from tag
        run: |
          VERSION="${{ needs.classify.outputs.version }}"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Release version: ${VERSION}"

      - name: Verify hatch-vcs version resolution
        run: uv run python devtools/check_vcs_version.py

      - name: Run quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run pytest tests/unit/ -x -m "not interactive and not long"

      - name: Download OpenAPI spec for model sync
        run: |
          mkdir -p .endorlabs-context/platform/openapi
          curl -sSfL -o .endorlabs-context/platform/openapi/openapiv2.swagger.json https://api.endorlabs.com/download/openapiv2.swagger.json

      - name: Verify committed ship artifacts are up to date
        run: |
          uv run python devtools/model_sync.py --generate-stubs --generate-reference-docs
          if [ ! -f src/endorlabs/generated/registry_contract.py ]; then
            echo "::error::Runtime registry contract was not generated."
            exit 1
          fi
          if [ ! -f src/endorlabs/generated/models/__init__.py ]; then
            echo "::error::Runtime generated model package was not generated."
            exit 1
          fi

      - name: Verify generated client stub is up to date
        run: |
          uv run python devtools/generate_client_stub.py
          if ! git diff --exit-code -- src/endorlabs/client_surface.pyi; then
            echo "::error::client_surface.pyi is out of date. Run: uv run python devtools/generate_client_stub.py"
            git --no-pager diff -- src/endorlabs/client_surface.pyi
            exit 1
          fi

      - name: Verify generated reference docs are up to date
        run: |
          uv run python devtools/generate_reference_docs.py
          if ! git diff --exit-code -- docs/generated-reference/resources.md docs/generated-reference/create-update-payloads.md docs/generated-reference/api-surfaces.md docs/generated-reference/coverage.json; then
            echo "::error::Reference docs are out of date. Run: uv run python devtools/generate_reference_docs.py"
            git --no-pager diff -- docs/generated-reference/resources.md docs/generated-reference/create-update-payloads.md docs/generated-reference/api-surfaces.md docs/generated-reference/coverage.json
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Verify distribution metadata
        run: uv run twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI (OIDC)
    runs-on: ubuntu-latest
    needs: [classify, build]
    if: needs.classify.outputs.is_final_release == 'true'
    environment: pypi
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI with attestations
        # PyPA publishes ghcr.io images for release/v1, not arbitrary commit SHAs.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  post-release-bump:
    name: Push Next Dev Anchor Tag
    runs-on: ubuntu-latest
    needs: [classify, publish-pypi]
    if: >-
      needs.classify.outputs.is_final_release == 'true' &&
      needs.publish-pypi.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Push next dev anchor tag
        run: |
          set -euo pipefail
          VERSION="${{ needs.classify.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}.dev0"
          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Dev anchor tag ${NEXT_TAG} already exists; skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_TAG" -m "Dev anchor after release v${VERSION}"
          git push origin "$NEXT_TAG"
          echo "Pushed dev anchor tag: ${NEXT_TAG}"

  release-summary:
    name: Publish Release Summary
    runs-on: ubuntu-latest
    needs: [classify, build, publish-pypi, post-release-bump]
    if: always()
    steps:
      - name: Publish release summary
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "### Run Context"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Tag ref: \`${{ github.ref }}\`"
            echo "- Actor: \`${{ github.actor }}\`"
            echo ""
            echo "### Outcome Matrix"
            echo "| Signal | Value |"
            echo "|---|---|"
            echo "| Tag | \`${{ github.ref_name }}\` |"
            echo "| Version | \`${{ needs.classify.outputs.version }}\` |"
            echo "| Final release | \`${{ needs.classify.outputs.is_final_release }}\` |"
            echo "| Build | \`${{ needs.build.result }}\` |"
            echo "| PyPI publish | \`${{ needs.publish-pypi.result }}\` |"
            echo "| Dev anchor bump | \`${{ needs.post-release-bump.result }}\` |"
            echo ""
            if [ "${{ needs.classify.outputs.is_final_release }}" != "true" ]; then
              echo "### Skips"
              echo "- Non-final tags skip build, PyPI publish, GitHub Release, and dev-anchor bump."
            else
              echo "### Next Action"
              echo "- Confirm GitHub Release assets and PyPI provenance on the project page."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
