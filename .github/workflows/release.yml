name: Release

# Triggered when a version tag is pushed (e.g. v0.1.0, v1.0.0-rc.1).
# Builds the package, runs the quality gate, and creates a GitHub Release
# with the wheel and sdist attached.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.9.3"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # full history for hatch-vcs version derivation

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        uses: astral-sh/setup-uv@v7.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
          uv run pytest tests/unit/ -x -m "not slow"

      - name: Build package
        run: uv build

      - name: Verify build artifacts
        run: |
          echo "Build artifacts:"
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
