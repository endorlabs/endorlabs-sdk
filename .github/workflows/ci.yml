name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  PYTHON_VERSION: "3.13"

jobs:
  # Dependency resolution job - runs once and caches dependencies
  resolve-dependencies:
    name: Resolve Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/pyproject.toml') }}" >> $GITHUB_OUTPUT

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-uv-

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

  # Lint job - runs in parallel with tests
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: resolve-dependencies
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ needs.resolve-dependencies.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-uv-

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run ruff linter
        run: |
          uv run ruff check .

      - name: Run ruff formatter check
        run: |
          uv run ruff format --check .

  # Test job - runs in parallel with lint
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: resolve-dependencies
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-
            ${{ runner.os }}-uv-

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run unit tests
        run: |
          uv run pytest --maxfail=2 --disable-warnings -m "not integration"

      - name: Run integration tests
        run: |
          uv run pytest --maxfail=2 --disable-warnings -m "integration"
        env:
          ENDOR_API: ${{ secrets.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ secrets.ENDOR_NAMESPACE }}

  # Security scan job - runs after lint and test pass
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, lint, test]
    if: always() && (needs.lint.result == 'success' && needs.test.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ needs.resolve-dependencies.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-uv-

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Install endorctl
        run: |
          # Install endorctl binary using official Endor Labs download
          curl -O https://api.endorlabs.com/download/latest/endorctl_linux_amd64
          chmod +x endorctl_linux_amd64
          sudo mv endorctl_linux_amd64 /usr/local/bin/endorctl
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}

      - name: Verify endorctl installation
        run: |
          endorctl --version
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}

      - name: Run Endorctl security scan
        run: |
          endorctl scan --namespace ${{ vars.ENDOR_NAMESPACE }}
        env:
          ENDOR_API: ${{ vars.ENDOR_API }}
          ENDOR_API_CREDENTIALS_KEY: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_CREDENTIALS_SECRET: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}

  # Coverage job - runs after tests pass
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [resolve-dependencies, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ needs.resolve-dependencies.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-uv-

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=endor_cockpit --cov-report=xml --cov-report=term-missing --maxfail=2 --disable-warnings -m "not integration"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-endor-cockpit
          fail_ci_if_error: false