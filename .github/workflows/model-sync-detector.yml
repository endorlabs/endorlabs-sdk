name: Model Sync Detector

permissions:
  contents: read

on:
  schedule:
    # Run hourly to check for endorctl version updates
    - cron: '0 * * * *'
    # Also run weekly on Mondays at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run model sync even without endorctl version change"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      force_run:
        description: "Run model sync even without endorctl version change"
        required: false
        default: false
        type: boolean
        # Keep false by default for reusable call sites.
  repository_dispatch:
    types: [model-sync-detector-check]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    name: Detect Endorctl Version and OpenAPI Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      upstream-changed: ${{ steps.check.outputs.upstream-changed }}
      version-changed: ${{ steps.check.outputs.version-changed }}
      spec-changed: ${{ steps.check.outputs.spec-changed }}
      latest-version: ${{ steps.check.outputs.version }}
      openapi-sha256: ${{ steps.check.outputs.openapi-sha256 }}
      previous-version: ${{ steps.check.outputs.previous-version }}
      previous-openapi-sha256: ${{ steps.check.outputs.previous-openapi-sha256 }}
      check-status: ${{ steps.check.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install UV
        uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          version: "0.9.3"

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Restore cached model-sync state
        id: cache-version
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: .github/cache/model_sync_state.json
          key: model-sync-state-${{ runner.os }}
          restore-keys: |
            model-sync-state-${{ runner.os }}

      - name: Check for version/hash update
        id: check
        run: |
          STATE_FILE=".github/cache/model_sync_state.json"
          VERSION_FILE=".github/cache/endorctl_version.txt"
          SPEC_FILE=".github/cache/openapiv2.swagger.json"
          mkdir -p .github/cache

          # Get latest endorctl version (fail-closed on script error)
          set +e
          uv run python .github/scripts/check_endorctl_version.py \
            --state-file "$VERSION_FILE" \
            --quiet
          VERSION_EXIT_CODE=$?
          set -e
          if [ $VERSION_EXIT_CODE -ne 0 ] && [ $VERSION_EXIT_CODE -ne 1 ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Version check failed (exit=$VERSION_EXIT_CODE)"
            exit 1
          fi

          LATEST_VERSION=$(cat "$VERSION_FILE" 2>/dev/null || echo "")
          if [ -z "$LATEST_VERSION" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Could not determine latest endorctl version"
            exit 1
          fi

          # Download OpenAPI and compute hash
          curl -sSfL -o "$SPEC_FILE" https://api.endorlabs.com/download/openapiv2.swagger.json
          OPENAPI_SHA256=$(sha256sum "$SPEC_FILE" | awk '{print $1}')
          if [ -z "$OPENAPI_SHA256" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "❌ Could not compute OpenAPI hash"
            exit 1
          fi

          PREV_VERSION=""
          PREV_HASH=""
          if [ -f "$STATE_FILE" ]; then
            PREV_VERSION=$(python -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('endorctl_version',''))" 2>/dev/null || echo "")
            PREV_HASH=$(python -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('openapi_sha256',''))" 2>/dev/null || echo "")
          fi

          VERSION_CHANGED=false
          SPEC_CHANGED=false
          if [ "$PREV_VERSION" != "$LATEST_VERSION" ]; then VERSION_CHANGED=true; fi
          if [ "$PREV_HASH" != "$OPENAPI_SHA256" ]; then SPEC_CHANGED=true; fi

          if [ "$VERSION_CHANGED" = "true" ] || [ "$SPEC_CHANGED" = "true" ]; then
            CHANGED=true
          else
            CHANGED=false
          fi

          python -c "import json,datetime; json.dump({'endorctl_version':'$LATEST_VERSION','openapi_sha256':'$OPENAPI_SHA256','updated_at':datetime.datetime.utcnow().replace(microsecond=0).isoformat()+'Z'}, open('$STATE_FILE','w'))"

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "upstream-changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "version-changed=$VERSION_CHANGED" >> $GITHUB_OUTPUT
          echo "spec-changed=$SPEC_CHANGED" >> $GITHUB_OUTPUT
          echo "status=ok" >> $GITHUB_OUTPUT
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "openapi-sha256=$OPENAPI_SHA256" >> $GITHUB_OUTPUT
          echo "previous-version=${PREV_VERSION:-<none>}" >> $GITHUB_OUTPUT
          echo "previous-openapi-sha256=${PREV_HASH:-<none>}" >> $GITHUB_OUTPUT

          if [ "$VERSION_CHANGED" = "true" ]; then
            echo "🔄 endorctl version update detected: ${PREV_VERSION:-<none>} -> $LATEST_VERSION"
          else
            echo "✅ endorctl version unchanged: $LATEST_VERSION"
          fi
          if [ "$SPEC_CHANGED" = "true" ]; then
            echo "🔄 OpenAPI hash update detected: ${PREV_HASH:-<none>} -> $OPENAPI_SHA256"
          else
            echo "✅ OpenAPI hash unchanged: $OPENAPI_SHA256"
          fi

      - name: Save model-sync state to cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: .github/cache/model_sync_state.json
          key: model-sync-state-${{ runner.os }}-${{ steps.check.outputs.version }}-${{ steps.check.outputs.openapi-sha256 }}
          restore-keys: |
            model-sync-state-${{ runner.os }}

  dispatch-sync:
    name: Dispatch Model Sync PR Workflow
    needs: check-version
    if: >-
      needs.check-version.result == 'success' &&
      (
        needs.check-version.outputs.version-changed == 'true' ||
        needs.check-version.outputs.spec-changed == 'true' ||
        inputs.force_run == true ||
        github.event.inputs.force_run == 'true' ||
        github.event.client_payload.force_run == 'true'
      )
    runs-on: ubuntu-latest
    outputs:
      reason: ${{ steps.dispatch.outputs.reason }}
    permissions:
      contents: write
    steps:
      - name: Dispatch sync workflow
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION_CHANGED: ${{ needs.check-version.outputs.version-changed }}
          SPEC_CHANGED: ${{ needs.check-version.outputs.spec-changed }}
          LATEST_VERSION: ${{ needs.check-version.outputs.latest-version }}
          OPENAPI_SHA256: ${{ needs.check-version.outputs.openapi-sha256 }}
          PREVIOUS_VERSION: ${{ needs.check-version.outputs.previous-version }}
          PREVIOUS_OPENAPI_SHA256: ${{ needs.check-version.outputs.previous-openapi-sha256 }}
          UPSTREAM_CHANGED: ${{ needs.check-version.outputs.upstream-changed }}
        run: |
          REASON="manual-or-dispatch"
          if [ "$VERSION_CHANGED" = "true" ] && [ "$SPEC_CHANGED" = "true" ]; then
            REASON="version-and-spec-change"
          elif [ "$VERSION_CHANGED" = "true" ]; then
            REASON="version-change"
          elif [ "$SPEC_CHANGED" = "true" ]; then
            REASON="spec-change"
          fi
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          curl -sSfL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/dispatches" \
            -d "{
              \"event_type\": \"model-sync-check\",
              \"client_payload\": {
                \"endorctl_version\": \"$LATEST_VERSION\",
                \"openapi_sha256\": \"$OPENAPI_SHA256\",
                \"prev_endorctl_version\": \"$PREVIOUS_VERSION\",
                \"prev_openapi_sha256\": \"$PREVIOUS_OPENAPI_SHA256\",
                \"openapi_source_url\": \"https://api.endorlabs.com/download/openapiv2.swagger.json\",
                \"reason\": \"$REASON\",
                \"upstream_changed\": \"$UPSTREAM_CHANGED\",
                \"version_changed\": \"$VERSION_CHANGED\",
                \"spec_changed\": \"$SPEC_CHANGED\",
                \"force_run\": \"true\"
              }
            }"

  summary:
    name: Detector Summary
    needs: [check-version, dispatch-sync]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish summary
        run: |
          DISPATCHED="${{ needs.dispatch-sync.result == 'success' }}"
          REASON="${{ needs.dispatch-sync.outputs.reason || 'no-dispatch' }}"
          VERSION_CHANGED="${{ needs.check-version.outputs.version-changed }}"
          SPEC_CHANGED="${{ needs.check-version.outputs.spec-changed }}"
          PREV_VERSION="${{ needs.check-version.outputs.previous-version }}"
          CURR_VERSION="${{ needs.check-version.outputs.latest-version }}"
          PREV_HASH="${{ needs.check-version.outputs.previous-openapi-sha256 }}"
          CURR_HASH="${{ needs.check-version.outputs.openapi-sha256 }}"
          HASH_PREV_SHORT=$(printf "%s" "$PREV_HASH" | cut -c1-12)
          HASH_CURR_SHORT=$(printf "%s" "$CURR_HASH" | cut -c1-12)
          FORCE_INPUT="${{ inputs.force_run || github.event.inputs.force_run || github.event.client_payload.force_run || 'false' }}"

          DISPATCH_CAUSES=""
          if [ "$VERSION_CHANGED" = "true" ]; then
            DISPATCH_CAUSES="${DISPATCH_CAUSES}- endorctl version changed\n"
          fi
          if [ "$SPEC_CHANGED" = "true" ]; then
            DISPATCH_CAUSES="${DISPATCH_CAUSES}- OpenAPI hash changed\n"
          fi
          if [ "${{ inputs.force_run }}" = "true" ] || [ "${{ github.event.inputs.force_run }}" = "true" ] || [ "${{ github.event.client_payload.force_run }}" = "true" ]; then
            DISPATCH_CAUSES="${DISPATCH_CAUSES}- force_run explicitly requested\n"
          fi
          if [ -z "$DISPATCH_CAUSES" ]; then
            DISPATCH_CAUSES="- none (dispatch should be skipped)"
          fi

          echo "## Model Sync Detector Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Decision" >> $GITHUB_STEP_SUMMARY
          echo "- Dispatch sync workflow: \`$DISPATCHED\`" >> $GITHUB_STEP_SUMMARY
          echo "- Reason: \`$REASON\`" >> $GITHUB_STEP_SUMMARY
          echo "- upstream_changed: \`${{ needs.check-version.outputs.upstream-changed }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What Changed" >> $GITHUB_STEP_SUMMARY
          if [ "$VERSION_CHANGED" = "true" ]; then
            echo "- endorctl: \`$PREV_VERSION\` -> \`$CURR_VERSION\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- endorctl: unchanged (\`$CURR_VERSION\`)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$SPEC_CHANGED" = "true" ]; then
            echo "- OpenAPI hash: \`$HASH_PREV_SHORT...\` -> \`$HASH_CURR_SHORT...\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- OpenAPI hash: unchanged (\`$HASH_CURR_SHORT...\`)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Why Dispatch Happened" >> $GITHUB_STEP_SUMMARY
          printf "%b\n" "$DISPATCH_CAUSES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dispatch Predicate Inputs" >> $GITHUB_STEP_SUMMARY
          echo "- version_changed: \`$VERSION_CHANGED\`" >> $GITHUB_STEP_SUMMARY
          echo "- spec_changed: \`$SPEC_CHANGED\`" >> $GITHUB_STEP_SUMMARY
          echo "- force_run_input: \`$FORCE_INPUT\`" >> $GITHUB_STEP_SUMMARY
          echo "- event: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Upstream Diff" >> $GITHUB_STEP_SUMMARY
          echo "| Signal | Previous | Current | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| endorctl version | \`${{ needs.check-version.outputs.previous-version }}\` | \`${{ needs.check-version.outputs.latest-version }}\` | \`${{ needs.check-version.outputs.version-changed }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenAPI SHA256 | \`${{ needs.check-version.outputs.previous-openapi-sha256 }}\` | \`${{ needs.check-version.outputs.openapi-sha256 }}\` | \`${{ needs.check-version.outputs.spec-changed }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trigger Context" >> $GITHUB_STEP_SUMMARY
          echo "- Event: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Force run input: \`${{ inputs.force_run || github.event.inputs.force_run || 'false' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- check-version: \`${{ needs.check-version.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- dispatch-sync: \`${{ needs.dispatch-sync.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Skips/Reasons" >> $GITHUB_STEP_SUMMARY
          echo "- When no upstream diff is detected and no force/manual trigger is used, dispatch is intentionally skipped." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Action" >> $GITHUB_STEP_SUMMARY
          echo "- If dispatched, monitor \`Model Sync PR\` for upstream API delta reporting and generated artifact/resource-level changes." >> $GITHUB_STEP_SUMMARY
          echo "- The sync workflow now reports upstream deltas even when generated artifacts are unchanged." >> $GITHUB_STEP_SUMMARY
