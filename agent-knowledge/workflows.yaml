# Supplemental workflow catalog rows (no linked skill or skill: null).
# Skill-linked workflows declare endorlabs.catalog in SKILL.md frontmatter.
workflows:
  - id: context-bootstrap
    cli: endor-context
    module: endorlabs.context.cli
    skill: null
    default_output: .endorlabs-context/
    agent_visible: true
  - id: graph-summarize
    cli: endor-graph-summarize
    module: endorlabs.workflows.relationships.summarize_session
    skill: endor-compile-dependency-graph
    default_output: stdout or --json
    agent_visible: true
  - id: collect-strategy-spike
    cli: endor-collect-strategy-spike
    module: endorlabs.workflows.relationships.collect_strategy_spike
    skill: null
    default_output: .endorlabs-context/workspace/sessions/<user>/exports/collect-strategy-spike/
    agent_visible: false
