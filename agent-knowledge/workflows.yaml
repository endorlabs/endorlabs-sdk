# Supplemental workflow catalog rows (no linked skill or skill: null).
# Skill-linked workflows declare endorlabs.catalog in SKILL.md frontmatter.
workflows:
  - id: context-bootstrap
    cli: endor-context
    module: endorlabs.context.cli
    skill: null
    default_output: .endorlabs-context/
    agent_visible: true
  - id: collect-strategy-spike
    cli: null
    module: endorlabs.workflows.estate.collect.benchmark
    skill: null
    default_output: .endorlabs-context/workspace/sessions/<user>/exports/collect-strategy-spike/
    agent_visible: false
  - id: estate-workspace
    cli: endor-estate
    module: endorlabs.workflows.estate.cli.main
    skill: null
    default_output: .endorlabs-context/workspace/<slug>-<YYYYMMDD>/
    agent_visible: false
    composition: library_api
    library_entrypoints:
      - endorlabs.workflows.estate.collect_workspace
      - endorlabs.workflows.estate.analyze_workspace
      - endorlabs.workflows.estate.export_version_cardinality_for_package_match
      - endorlabs.workflows.estate.export_risk_ranked_version_cardinality
