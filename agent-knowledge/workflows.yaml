# Supplemental workflow catalog rows (no linked skill or skill: null).
# Skill-linked workflows declare endorlabs.catalog in SKILL.md frontmatter.
workflows:
  - id: context-bootstrap
    cli: endor-context
    module: endorlabs.context.cli
    skill: null
    default_output: .endorlabs-context/
    agent_visible: true
  - id: collect-strategy-spike
    cli: null
    module: endorlabs.workflows.estate.collect.benchmark
    skill: null
    default_output: .endorlabs-context/workspace/sessions/<user>/exports/collect-strategy-spike/
    agent_visible: false
  - id: estate-workspace
    cli: endor-estate
    module: endorlabs.workflows.estate.cli.main
    skill: null
    default_output: .endorlabs-context/workspace/<slug>-<YYYYMMDD>/
    agent_visible: false
    composition: library_api
    library_entrypoints:
      - endorlabs.workflows.estate.collect_workspace
      - endorlabs.workflows.estate.analyze_workspace
      - endorlabs.workflows.estate.fetch_online_dashboard_counts
      - endorlabs.workflows.estate.export_version_cardinality_for_package_match
      - endorlabs.workflows.estate.export_risk_ranked_version_cardinality
  - id: query-estate-routing
    cli: null
    module: endorlabs.query
    skill: endor-route-estate-queries
    default_output: null
    agent_visible: true
    composition: library_api
    library_entrypoints:
      - endorlabs.query.discover_topology
      - endorlabs.query.recommend
      - endorlabs.query.validate_sample
      - endorlabs.query.preflight_count
      - endorlabs.workflows.estate.online.dashboard.fetch_online_dashboard_counts
      - endorlabs.workflows.agent_context.dashboard_counts.project_pv_counts
      - endorlabs.workflows.agent_context.dashboard_counts.project_category_counts
      - endorlabs.workflows.query_collect.collect_project_findings_via_query
  - id: callgraph-path
    cli: endor-callgraph-path
    module: endorlabs.workflows.callgraph.path_cli
    skill: null
    default_output: stdout or caller path
    agent_visible: true
    composition: library_api
    library_entrypoints:
      - endorlabs.workflows.callgraph.run_path_search
      - endorlabs.workflows.callgraph.resolve_package_version_with_callgraph
      - endorlabs.workflows.callgraph.find_call_graph_path
  - id: vector-query
    cli: endor-vector-query
    module: endorlabs.workflows.vector_search.cli
    skill: null
    default_output: stdout or caller path
    agent_visible: true
    composition: library_api
    library_entrypoints:
      - endorlabs.workflows.vector_search.list_tenant_vector_stores
      - endorlabs.workflows.vector_search.probe_store_indexed_for_project
      - endorlabs.workflows.vector_search.query_vector_store
