# Pre-commit hooks — last gate before code lands in history.
#
# Ruff/pyright steps mirror .github/workflows/ci-pr-main.yml (lint job):
#   uv run ruff check .
#   uv run ruff format --check .
#   uv run pyright --project pyproject.toml
#   uv run pytest tests/unit/ -m "not interactive and not long"
#   uv run ruff check --select E,F,I,UP <CI-critical scripts>
#   uv run pyright --project pyproject.toml <same scripts>
#   uv run python devtools/verify_ship_artifacts.py --fetch-spec  (pre-push; CI lint)
#
# Ship-artifact verify runs before ruff/pyright on commit (local spec, regen + git
# diff) so linters typecheck regenerated surfaces. Pre-push runs the full gate
# (--fetch-spec, upstream SHA) and replaces separate upstream/agent-knowledge hooks.
#
# We use local `uv run` hooks instead of astral-sh/ruff-pre-commit because that
# hook passes --force-exclude, which skips paths listed in [tool.ruff] exclude
# (including devtools/) even when those files are staged — diverging from CI.
#
# Install: uv run pre-commit install && uv run pre-commit install --hook-type pre-push
# Run manually: uv run pre-commit run --all-files
repos:
  # --- Ruff + Pyright (parity with CI PR Main lint job) ---
  - repo: local
    hooks:
      - id: refresh-local-context-and-skills
        name: refresh local context + skill mirrors
        entry: uv
        args: [run, python, -m, endorlabs.context._maintainer_refresh]
        language: system
        require_serial: true
        files: ^(agent-knowledge/.*|src/endorlabs/context/.*|src/endorlabs/agent_knowledge/.*)$

      # Regenerate + drift-check ship surfaces before linters (local OpenAPI spec).
      - id: ship-artifacts-verify
        name: ship artifacts verify (regen + drift; before linters)
        entry: uv
        args:
          - run
          - python
          - devtools/verify_ship_artifacts.py
          - --skip-upstream
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^devtools/(model_sync\.py|model_sync_profiles/|sync/|generate_client_stub\.py|generate_reference_docs\.py|verify_ship_artifacts\.py)|^src/endorlabs/(generated/|registry_overlay\.py|registry\.py|client_surface\.pyi)|^docs/generated-reference/)

      - id: ruff-check
        name: ruff check (repo-wide)
        entry: uv
        args: [run, ruff, check, .]
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^\.github/workflows/.*\.(yaml|yml)$|.*\.(py|pyi)$)

      - id: ruff-format-check
        name: ruff format --check (repo-wide)
        entry: uv
        args: [run, ruff, format, --check, .]
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^\.github/workflows/.*\.(yaml|yml)$|.*\.(py|pyi)$)

      - id: pyright
        name: pyright (project; src + tests per pyproject)
        entry: uv
        args: [run, pyright, --project, pyproject.toml]
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^\.github/workflows/.*\.(yaml|yml)$|.*\.(py|pyi)$)

      - id: pytest-unit
        name: pytest unit (CI parity; not interactive or long)
        entry: uv
        args:
          - run
          - pytest
          - tests/unit/
          - -q
          - -m
          - "not interactive and not long"
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^tests/.*|^src/endorlabs/.*|.*\.(py|pyi)$)

      - id: consumer-wire-fixtures-verify
        name: consumer wire fixtures verify
        entry: uv
        args: [run, python, devtools/audit_consumer_surfaces.py, --check]
        language: system
        pass_filenames: false
        require_serial: true
        files: (^tests/fixtures/models/.*|^src/endorlabs/resources/.*|^devtools/audit_consumer_surfaces\.py$)

      # Paths must stay aligned with ci-pr-main.yml "Validate CI-critical automation scripts".
      - id: ruff-check-ci-critical-automation
        name: ruff check (CI-critical automation; E,F,I,UP)
        entry: uv
        args:
          - run
          - ruff
          - check
          - --select
          - E,F,I,UP
          - devtools/model_sync.py
          - devtools/generate_client_stub.py
          - devtools/generate_reference_docs.py
          - devtools/sync_agent_knowledge.py
          - devtools/agent_knowledge_catalog.py
          - devtools/sync/cli.py
          - devtools/sync/upstream_verify.py
          - devtools/verify_ship_artifacts.py
          - .github/scripts/check_endorctl_version.py
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^(devtools/(model_sync\.py|generate_client_stub\.py|generate_reference_docs\.py|sync_agent_knowledge\.py|agent_knowledge_catalog\.py|sync/cli\.py|sync/upstream_verify\.py|verify_ship_artifacts\.py)|\.github/scripts/check_endorctl_version\.py)$)

      - id: pyright-ci-critical-automation
        name: pyright (CI-critical automation scripts)
        entry: uv
        args:
          - run
          - pyright
          - --project
          - pyproject.toml
          - devtools/model_sync.py
          - devtools/generate_client_stub.py
          - devtools/generate_reference_docs.py
          - devtools/sync_agent_knowledge.py
          - devtools/agent_knowledge_catalog.py
          - devtools/sync/cli.py
          - devtools/sync/upstream_verify.py
          - devtools/verify_ship_artifacts.py
          - .github/scripts/check_endorctl_version.py
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^(devtools/(model_sync\.py|generate_client_stub\.py|generate_reference_docs\.py|sync_agent_knowledge\.py|agent_knowledge_catalog\.py|sync/cli\.py|sync/upstream_verify\.py|verify_ship_artifacts\.py)|\.github/scripts/check_endorctl_version\.py)$)

      - id: model-sync-contract-validate
        name: model-sync contract validation
        entry: uv
        args:
          - run
          - pytest
          - tests/unit/tooling/scripts/test_generated_contract_quality_gates.py
          - -q
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
        files: (^pyproject\.toml$|^src/endorlabs/registry\.py$|^(devtools/(model_sync\.py|generate_client_stub\.py|generate_reference_docs\.py|sync/.*\.py))$)

      - id: ship-artifacts-verify-upstream
        name: ship artifacts verify (upstream + full gate; CI parity)
        entry: uv
        args:
          - run
          - python
          - devtools/verify_ship_artifacts.py
          - --fetch-spec
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

  # --- Spell checking ---
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [--skip, "*.json,*.lock,.git,.endorlabs-context,src/endorlabs/generated"]
        # pre-push passes explicit paths; --skip alone does not ignore them.
        exclude: ^src/endorlabs/generated/.*$

  # --- Python SAST ---
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-q", "-r", "src/endorlabs", "-x", "tests", "-lll"]
        pass_filenames: false
        stages: [pre-push]

  # --- Secrets detection ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
        args: ["--staged", "--redact"]
        pass_filenames: false

  # --- General file hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: ^src/endorlabs/generated/
      - id: trailing-whitespace
        exclude: ^src/endorlabs/generated/
