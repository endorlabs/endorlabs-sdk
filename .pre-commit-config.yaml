# Pre-commit hooks — last gate before code lands in history.
#
# Ruff/pyright steps mirror .github/workflows/ci-pr-main.yml (lint job):
#   uv run ruff check .
#   uv run ruff format --check .
#   uv run pyright --project pyproject.toml
#   uv run pytest tests/unit/ -m "not interactive and not long"
#   uv run ruff check --select E,F,I,UP <CI-critical scripts>
#   uv run pyright --project pyproject.toml <same scripts>
#   uv run python devtools/ship/verify_ship_artifacts.py --fetch-spec  (pre-push; CI lint)
#
# Ship-artifact verify runs before ruff/pyright on commit (local spec, regen + git
# diff) so linters typecheck regenerated surfaces. Pre-push runs only the upstream
# full gate (--fetch-spec), model-sync contract validate, and bandit — not a second
# pass of ruff/pyright/pytest or skip-upstream ship verify.
#
# Layout: devtools/precommit/ | codegen/ | ship/ — see devtools/README.md.
#
# default_stages: pre-commit only — hooks without explicit stages do not rerun on
# push (pre-commit 4.x otherwise defaults to all stages).
default_stages: [pre-commit]
# Stop after the first failing hook so cheap content guards do not still burn
# ruff/pyright/pytest time on an already-rejected commit.
fail_fast: true
#
# We use local `uv run` hooks instead of astral-sh/ruff-pre-commit because that
# hook passes --force-exclude, which skips paths listed in [tool.ruff] exclude
# (including devtools/) even when those files are staged — diverging from CI.
#
# Install: uv run pre-commit install && uv run pre-commit install --hook-type pre-push
# Guards: devtools/precommit/pre_commit_guards.py (policy) + devtools/precommit/git_staged.py (staged listing);
#   rule endor-maintainer-tooling — block .env / .endorlabs-context/ staged;
#   changelog Unreleased reminder (stderr, non-blocking) on user-facing diffs.
# Run manually: uv run pre-commit run --all-files
repos:
  # --- Ruff + Pyright (parity with CI PR Main lint job) ---
  - repo: local
    hooks:
      - id: pre-commit-guards-blocked-paths
        name: block gitignored runtime paths (.endorlabs-context, .env)
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, blocked-paths]
        language: system
        pass_filenames: false
        always_run: true

      - id: pre-commit-guards-changelog-reminder
        name: changelog Unreleased reminder (user-facing staged paths)
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, changelog-reminder]
        language: system
        pass_filenames: false
        always_run: true

      - id: pre-commit-guards-layer-imports
        name: block forbidden cross-layer imports
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, layer-imports]
        language: system
        pass_filenames: false
        always_run: true
        files: ^src/endorlabs/.*\.py$

      - id: pre-commit-guards-bounds-shim
        name: block estate.collect.bounds imports
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, bounds-shim]
        language: system
        pass_filenames: false
        always_run: true
        files: ^(src/|tests/).*\.py$

      - id: pre-commit-guards-deprecated-api-strings
        name: block deprecated API strings in agent/docs
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, deprecated-api-strings]
        language: system
        pass_filenames: false
        always_run: true
        files: ^(agent-knowledge/|\.cursor/rules/|docs/).*\.(md|mdc)$

      - id: pre-commit-guards-accessor-nudge
        name: accessor-first nudge (warning; hand-built project_uuid filters)
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, accessor-nudge]
        language: system
        pass_filenames: false
        always_run: true
        files: ^src/endorlabs/workflows/.*\.py$

      - id: pre-commit-guards-portable-examples
        name: block estate literals in staged checked-in paths
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, portable-examples]
        language: system
        pass_filenames: false
        always_run: true

      - id: pre-commit-guards-external-pii-urls
        name: block emails, non-Endor URLs, estate -n flags; gate shipped -n placeholders
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, external-pii-urls]
        language: system
        pass_filenames: false
        always_run: true

      - id: pre-commit-guards-agent-knowledge-sync
        name: agent-knowledge sync reminder (authoring without shipped mirror)
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, agent-knowledge-sync]
        language: system
        pass_filenames: false
        always_run: true
        files: ^agent-knowledge/

      - id: pre-commit-guards-context-root-literals
        name: block hard-coded .endorlabs-context path constants
        entry: uv
        args: [run, python, devtools/precommit/pre_commit_guards.py, context-root-literals]
        language: system
        pass_filenames: false
        always_run: true
        files: ^(src/endorlabs/.*\.py|agent-knowledge/.*/scripts/.*\.py)$

      - id: refresh-local-context-and-skills
        name: refresh local context + skill mirrors
        entry: uv
        args: [run, python, -m, endorlabs.context._maintainer_refresh]
        language: system
        require_serial: true
        files: ^(agent-knowledge/.*|src/endorlabs/context/.*|src/endorlabs/agent_knowledge/.*)$

      # Regenerate + drift-check ship surfaces before linters (local OpenAPI spec).
      - id: ship-artifacts-verify
        name: ship artifacts verify (regen + drift; before linters)
        entry: uv
        args:
          - run
          - python
          - devtools/ship/verify_ship_artifacts.py
          - --skip-upstream
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^devtools/(codegen/(model_sync\.py|model_sync_profiles/|sync/|generate_client_stub\.py|generate_reference_docs\.py)|ship/verify_ship_artifacts\.py)|^src/endorlabs/(generated/|registry_overlay\.py|registry\.py|client_surface\.pyi)|^docs/generated-reference/)

      - id: ruff-check
        name: ruff check (repo-wide)
        entry: uv
        args: [run, ruff, check, .]
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^\.github/workflows/.*\.(yaml|yml)$|.*\.(py|pyi)$)

      - id: ruff-format-check
        name: ruff format --check (repo-wide)
        entry: uv
        args: [run, ruff, format, --check, .]
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^\.github/workflows/.*\.(yaml|yml)$|.*\.(py|pyi)$)

      - id: pyright
        name: pyright (project; src + tests per pyproject)
        entry: uv
        args: [run, pyright, --project, pyproject.toml]
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^\.github/workflows/.*\.(yaml|yml)$|.*\.(py|pyi)$)

      - id: pytest-unit
        name: pytest unit (CI parity; not interactive or long)
        entry: uv
        args:
          - run
          - pytest
          - tests/unit/
          - -q
          - -m
          - "not interactive and not long"
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^tests/.*|^src/endorlabs/.*|.*\.(py|pyi)$)

      - id: consumer-wire-fixtures-verify
        name: consumer wire fixtures verify
        entry: uv
        args: [run, python, devtools/precommit/audit_consumer_surfaces.py, --check]
        language: system
        pass_filenames: false
        require_serial: true
        files: (^tests/fixtures/models/.*|^src/endorlabs/resources/.*|^devtools/precommit/audit_consumer_surfaces\.py$)

      # Paths must stay aligned with ci-pr-main.yml "Validate CI-critical automation scripts".
      - id: ruff-check-ci-critical-automation
        name: ruff check (CI-critical automation; E,F,I,UP)
        entry: uv
        args:
          - run
          - ruff
          - check
          - --select
          - E,F,I,UP
          - devtools/codegen/model_sync.py
          - devtools/codegen/generate_client_stub.py
          - devtools/codegen/generate_reference_docs.py
          - devtools/codegen/sync_agent_knowledge.py
          - devtools/codegen/agent_knowledge_catalog.py
          - devtools/codegen/sync/cli.py
          - devtools/codegen/sync/upstream_verify.py
          - devtools/ship/verify_ship_artifacts.py
          - devtools/precommit/git_staged.py
          - devtools/precommit/pre_commit_guards.py
          - .github/scripts/check_endorctl_version.py
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^(devtools/(codegen/(model_sync\.py|generate_client_stub\.py|generate_reference_docs\.py|sync_agent_knowledge\.py|agent_knowledge_catalog\.py|sync/cli\.py|sync/upstream_verify\.py)|ship/verify_ship_artifacts\.py|precommit/(git_staged\.py|pre_commit_guards\.py))|\.github/scripts/check_endorctl_version\.py)$)

      - id: pyright-ci-critical-automation
        name: pyright (CI-critical automation scripts)
        entry: uv
        args:
          - run
          - pyright
          - --project
          - pyproject.toml
          - devtools/codegen/model_sync.py
          - devtools/codegen/generate_client_stub.py
          - devtools/codegen/generate_reference_docs.py
          - devtools/codegen/sync_agent_knowledge.py
          - devtools/codegen/agent_knowledge_catalog.py
          - devtools/codegen/sync/cli.py
          - devtools/codegen/sync/upstream_verify.py
          - devtools/ship/verify_ship_artifacts.py
          - devtools/precommit/git_staged.py
          - devtools/precommit/pre_commit_guards.py
          - .github/scripts/check_endorctl_version.py
        language: system
        pass_filenames: false
        require_serial: true
        files: (^pyproject\.toml$|^(devtools/(codegen/(model_sync\.py|generate_client_stub\.py|generate_reference_docs\.py|sync_agent_knowledge\.py|agent_knowledge_catalog\.py|sync/cli\.py|sync/upstream_verify\.py)|ship/verify_ship_artifacts\.py|precommit/(git_staged\.py|pre_commit_guards\.py))|\.github/scripts/check_endorctl_version\.py)$)

      - id: model-sync-contract-validate
        name: model-sync contract validation
        entry: uv
        args:
          - run
          - pytest
          - tests/unit/tooling/scripts/test_generated_contract_quality_gates.py
          - -q
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
        files: (^pyproject\.toml$|^src/endorlabs/registry\.py$|^(devtools/codegen/(model_sync\.py|generate_client_stub\.py|generate_reference_docs\.py|sync/.*\.py))$)

      - id: ship-artifacts-verify-upstream
        name: ship artifacts verify (upstream + full gate; CI parity)
        entry: uv
        args:
          - run
          - python
          - devtools/ship/verify_ship_artifacts.py
          - --fetch-spec
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

  # --- Spell checking ---
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        stages: [pre-commit]
        args: [--skip, "*.json,*.lock,.git,.endorlabs-context,src/endorlabs/generated"]
        # pre-push passes explicit paths; --skip alone does not ignore them.
        exclude: ^src/endorlabs/generated/.*$

  # --- Python SAST ---
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-q", "-r", "src/endorlabs", "-x", "tests", "-lll"]
        pass_filenames: false
        stages: [pre-push]

  # --- Secrets detection ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
        stages: [pre-commit]
        args: ["--staged", "--redact"]
        pass_filenames: false

  # --- General file hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=500]
      - id: detect-private-key
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: ^src/endorlabs/generated/
      - id: trailing-whitespace
        stages: [pre-commit]
        exclude: ^src/endorlabs/generated/
