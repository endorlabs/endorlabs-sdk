# Pre-commit runs lint/format/typecheck on commit. Pre-commit is a dev dependency.
# After clone: uv sync && uv run pre-commit install
# Hooks run automatically on git commit. See CONTRIBUTORS.md for details.

minimum_pre_commit_version: "4.5.1"
default_install_hook_types: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check .
        language: system
        types: [python]
      - id: pyright
        name: pyright
        entry: uv run pyright --project pyproject.toml
        language: system
        types: [python]
