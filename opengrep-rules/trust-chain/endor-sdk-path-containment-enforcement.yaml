rules:
  - id: endor-sdk-path-containment-enforcement
    languages:
      - python
    message: |
      Problem:
      A file write operation (`write_text` or `write_bytes`) is performed on
      a Path object that was not first resolved with `.resolve()` and checked
      for containment within an allowed base directory.  Without resolution,
      a path containing `../` sequences can write files outside the intended
      directory (path traversal).

      Solution:
      Use the `safe_write_text()` or `safe_write_bytes()` helper from
      `endorlabs.utils.path_safety`:

      ```python
      from endorlabs.utils.path_safety import safe_write_text

      safe_write_text(base_dir, target_path, content)
      ```

      The helper lives in `src/endorlabs/utils/path_safety.py`. It resolves
      both paths, checks containment with `Path.is_relative_to()`, creates
      parent directories, and writes the file. The `base_dir` should be the
      intended output root (e.g. `session_dir`, `output_dir`, `out_dir`).

      Do NOT inline containment checks at each write site -- use the shared
      helper so the validation logic is maintained in one place.

      Trust chain:
      This is the enforcement half of the path containment trust chain.
      The paired validation rule
      `endor-sdk-path-containment-validation` validates that the
      safe_write_text helper implementation has not degraded.  Both rules
      must pass for the security contract to hold.
    metadata:
      category: security
      confidence: MEDIUM
      cwe:
        - "CWE-22: Improper Limitation of a Pathname to a Restricted Directory"
      description: >-
        File write on an unresolved Path -- path traversal sequences (../)
        in the path could write files outside the intended directory.
        Resolve and check containment first.
      endor-category: vulnerability
      endor-rule-origin:
        license: Apache-2.0
        url: https://github.com/Endor-Solutions-Architecture/endorlabs-sdk
      endor-tags:
        - A01:2021
        - Path-Traversal
        - trust-chain.id:path-containment-check
        - trust-chain.role:enforcement
      endor-targets:
        - ENDOR_TARGET_REPOSITORY
      explanation: >-
        The SDK experimental workflows write files to user-specified output
        directories (e.g. Semgrep rule export).  If the output path is not
        resolved and checked for containment, an attacker-controlled path
        component could write files to arbitrary locations.  This rule flags
        write_text and write_bytes calls that are not preceded by a .resolve()
        call on the same path variable, enforcing the principle of least
        authority for filesystem operations.
      impact: MEDIUM
      owasp:
        - A01:2021-Broken-Access-Control
      references:
        - https://cwe.mitre.org/data/definitions/22.html
        - https://owasp.org/www-community/attacks/Path_Traversal
        - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
      remediation: >-
        Replace bare .write_text() / .write_bytes() calls with
        safe_write_text(base_dir, target, content) or safe_write_bytes()
        from endorlabs.utils.path_safety. Do not inline containment
        checks -- the shared helper encapsulates resolve + is_relative_to.
      security-severity: Medium
      version: v1.2.0
    patterns:
      - pattern-either:
          - pattern: $PATH.write_text(...)
          - pattern: $PATH.write_bytes(...)
      - pattern-not-inside: |
          $PATH = $BASE.resolve()
          ...
          $PATH.write_text(...)
      - pattern-not-inside: |
          $PATH = $BASE.resolve()
          ...
          $PATH.write_bytes(...)
    severity: WARNING
    paths:
      include:
        - src/endorlabs/
