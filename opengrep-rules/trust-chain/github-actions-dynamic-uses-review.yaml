rules:
  - id: github-actions-dynamic-uses-review
    languages:
      - regex
    message: |
      Problem:
      GitHub Actions `uses:` reference is dynamically constructed and cannot be
      statically verified as pinned to an immutable commit SHA.

      Why this matters:
      Dynamic refs (for example via `${{ ... }}`) may resolve to mutable tags or
      branches at runtime, weakening supply-chain integrity guarantees.

      Recommendation:
      Prefer explicit static refs pinned to full 40-character commit SHAs, or
      constrain dynamic inputs to an allowlist of known SHA-pinned values.
    metadata:
      category: security
      confidence: MEDIUM
      cwe:
        - "CWE-494: Download of Code Without Integrity Check"
      description: >-
        Dynamic GitHub Actions uses refs should be reviewed because static SHA
        pinning cannot be verified by SAST.
      endor-category: best_practice
      endor-rule-origin:
        license: Apache-2.0
        url: https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions
      endor-tags:
        - A06:2021
        - Supply-Chain
        - GitHub-Actions
      endor-targets:
        - ENDOR_TARGET_REPOSITORY
      explanation: >-
        Static analysis cannot determine whether dynamic `uses:` values resolve
        to immutable SHAs. Manual review is needed to ensure trust boundaries
        and pinning guarantees are preserved.
      impact: MEDIUM
      owasp:
        - A06:2021-Vulnerable and Outdated Components
      references:
        - https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
      remediation: >-
        Replace dynamic action references with static SHA-pinned refs where
        possible, or enforce strict allowlisted pinned values.
      security-severity: Medium
      version: v1.0.0
    severity: INFO
    patterns:
      - pattern-regex: |
          (?m)^\s*[-]?\s*uses:\s*['"]?.*\$\{\{[^}]+\}\}.*
    paths:
      include:
        - .github/workflows/*.yml
        - .github/workflows/*.yaml
        - .github/**/action.yml
        - .github/**/action.yaml
