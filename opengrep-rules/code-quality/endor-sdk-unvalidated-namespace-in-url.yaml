rules:
  - id: endor-sdk-unvalidated-namespace-in-url
    languages:
      - python
    message: |
      Problem:
      A namespace string is interpolated directly into a URL path via
      f-string without prior format validation.  Namespace strings should
      match the canonical format (alphanumeric characters, dots, hyphens,
      and underscores only).  A namespace containing `/` or `../` could
      alter the URL path structure and direct API calls to unintended
      endpoints.

      This is a marker rule -- it fires on every URL construction site
      that interpolates into `v1/namespaces/` so new sites are always
      flagged for review.

      Solution:
      Validate namespace strings before URL construction:

      ```python
      import re

      _NAMESPACE_RE = re.compile(r"^[a-zA-Z0-9._-]+$")

      def validate_namespace(ns: str) -> str:
          if not _NAMESPACE_RE.match(ns):
              raise EndorValidationError(
                  f"Invalid namespace format: {ns!r}"
              )
          return ns

      # Then use in URL construction:
      url = f"v1/namespaces/{validate_namespace(ns)}/{resource}"
      ```
    metadata:
      category: security
      confidence: MEDIUM
      cwe:
        - "CWE-74: Improper Neutralization of Special Elements in Output"
      description: >-
        Namespace string interpolated into URL path without format
        validation -- a namespace containing path separators could redirect
        API calls to unintended endpoints.
      endor-category: vulnerability
      endor-rule-origin:
        license: Apache-2.0
        url: https://github.com/Endor-Solutions-Architecture/endorlabs-sdk
      endor-tags:
        - URL-Path-Injection
      endor-targets:
        - ENDOR_TARGET_REPOSITORY
      explanation: >-
        The SDK constructs API URLs by interpolating namespace strings into
        f-strings like f"v1/namespaces/{ns}/{resource}".  The namespace
        originates from user input (Client constructor) or API responses
        (tenant_meta.namespace on traversed resources).  Without format
        validation, a namespace containing "/" or ".." could alter the URL
        path.  This marker rule ensures every URL construction site is
        reviewed for upstream namespace validation.
      impact: MEDIUM
      references:
        - https://cwe.mitre.org/data/definitions/74.html
      remediation: >-
        Add a namespace format validation function that checks against
        ^[a-zA-Z0-9._-]+$ and call it before any URL construction.
        Centralize URL building in BaseResource to minimize construction
        sites.
      security-severity: Medium
      version: v1.0.0
    pattern-regex: "f[\"']v1/namespaces/\\{"
    severity: WARNING
    paths:
      include:
        - src/endorlabs/
