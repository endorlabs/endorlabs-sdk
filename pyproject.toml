[project]
name = "endor-cockpit"
version = "0.1.0"
description = "A foundational workspace to administer, operate and scan with Endor Labs tooling through REST APIs"
authors = [
    { name = "Tim Gowan", email = "tgowan@endor.ai" }
]
license = { file = "LICENSE" }
readme = "README.md"
requires-python = ">=3.12,<3.16"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests==2.32.5",
    "pydantic==2.12.3",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
docs = [
    "beautifulsoup4==4.14.2",
    "markdownify==1.2.0",
]

[build-system]
requires = ["hatchling>=1.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/endor_cockpit"]

[tool.ruff]
line-length = 88
exclude = [
    ".git",
    ".venv",
    "venv",
    "env",
    "ENV",
    "env.bak",
    "venv.bak",
    ".vscode",
    ".idea",
    ".pytest_cache",
    ".tox",
    ".nox",
    ".ruff_cache",
    "workspace",
    "workspace/**",
    "scripts/",  # Root-level utility scripts
    "scripts/**",  # Allow complexity in utility scripts
    "maneuvers/",  # Maneuver scripts - utility automation scripts
    "maneuvers/**",  
    "*.log",
    "__pycache__",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    "build",
    "dist",
    "*.egg-info",
    ".coverage",
    "coverage.xml",
    ".hypothesis",
    ".DS_Store",
    "Thumbs.db"
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--disable-warnings"
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "local: marks tests as local-only (excluded from CI)"
]

[dependency-groups]
dev = [
    "jsonschema==4.25.1",
    "pytest==8.4.2",
    "pytest-cov==7.0.0",
    "ruff==0.14.1",
]

# Endor Cockpit configuration
[tool.endor_cockpit]
# Configuration values come from environment variables
# ENDOR_API: Endor Labs API endpoint (default: https://api.endorlabs.com)
# ENDOR_NAMESPACE: Tenant namespace for operations (required)
# ENDOR_API_CREDENTIALS_KEY: API authentication key (required)
# ENDOR_API_CREDENTIALS_SECRET: API authentication secret (required)

# Logging configuration
[tool.logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[tool.logging.endor_cockpit]
level = "INFO"
format = "%(asctime)s - %(levelname)s - %(message)s"
