[build-system]
requires = ["hatchling>=1.0"]
build-backend = "hatchling.build"

[project]
name = "endor_sdk"
version = "0.1.0"
description = "SDK for the Endor Labs API"
authors = [
    { name = "Your Name", email = "you@example.com" }
]
license = { file = "LICENSE" }
readme = "README.md"
requires-python = ">=3.14"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests==2.32.5",
    "pydantic==2.12.3"
]

[project.optional-dependencies]
dev = [
    "pytest==8.4.2",
    "black==25.9.0",
    "ruff==0.14.1"
]
sec = [

]
ops = [
    
]

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88
select = ["E", "W", "F", "I", "C", "B"]
