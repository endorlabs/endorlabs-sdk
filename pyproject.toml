[project]
name = "endor-cockpit"
version = "0.1.0"
description = "A foundational workspace to administer, operate and scan with Endor Labs tooling through REST APIs"
authors = [
    { name = "Your Name", email = "you@example.com" }
]
license = { file = "LICENSE" }
readme = "README.md"
requires-python = ">=3.13,<3.15"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests==2.32.5",
    "pydantic==2.12.3"
]

[project.optional-dependencies]
dev = [
    "pytest==8.4.2",
    "pytest-cov==6.0.0",
    "ruff==0.14.1",
    "jsonschema==4.23.0"
]
sec = []
ops = []
vector = [
    "chromadb>=0.4.0",
    "openai>=1.0.0"
]
rag = [
    "chromadb>=0.4.0",
    "openai>=1.0.0",
    "langchain>=0.1.0",
    "anthropic>=0.8.0"
]


[build-system]
requires = ["hatchling>=1.0"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--disable-warnings"
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests"
]

[dependency-groups]
dev = [
    "jsonschema>=4.23.0",
    "pytest>=8.4.2",
    "pytest-cov>=6.0.0",
    "ruff>=0.14.1",
]
vector = [
    "chromadb>=0.4.0",
    "openai>=1.0.0"
]
rag = [
    "chromadb>=0.4.0",
    "openai>=1.0.0",
    "langchain>=0.1.0",
    "anthropic>=0.8.0"
]

# Vector Database configuration
[tool.vector_db]
# ChromaDB configuration
chroma_path = "workflow/vector_db"
collection_name = "endor_cockpit_docs"
embedding_model = "text-embedding-3-small"

# Chunking strategy configuration
[tool.vector_db.chunking]
markdown_max_chunk_size = 1000
markdown_overlap = 200
code_max_chunk_size = 800
code_overlap = 100
api_spec_max_chunk_size = 2000
api_spec_overlap = 300

# Content type detection patterns
[tool.vector_db.patterns]
markdown = ["\\.md$", "\\.rst$"]
code = ["\\.py$", "\\.js$", "\\.ts$", "\\.go$", "\\.java$"]
api_spec = ["openapi.*\\.json$", "swagger.*\\.json$", "\\.yaml$", "\\.yml$"]

# Logging configuration
[tool.logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
