[project]
name = "endor-cockpit"
version = "0.1.0"
description = "A foundational workspace to administer, operate and scan with Endor Labs tooling through REST APIs"
authors = [
    { name = "Your Name", email = "you@example.com" }
]
license = { file = "LICENSE" }
readme = "README.md"
requires-python = ">=3.12,<3.16"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests==2.32.5",
    "pydantic==2.12.3",
]

# Removed [project.optional-dependencies] as it's now in dependency-groups

[build-system]
requires = ["hatchling>=1.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/endor_cockpit", "src/holocron"]

[tool.ruff]
line-length = 88
exclude = [
    ".git",
    ".venv",
    "venv",
    "env",
    "ENV",
    "env.bak",
    "venv.bak",
    ".vscode",
    ".idea",
    ".pytest_cache",
    ".tox",
    ".nox",
    ".ruff_cache",
    "holocron_data/",
    "holocron_data/**",
    "workspace",
    "workspace/**",
    "scripts/",  # Root-level utility scripts
    "scripts/**",  # Allow complexity in utility scripts
    "*.log",
    "__pycache__",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    "build",
    "dist",
    "*.egg-info",
    ".coverage",
    "coverage.xml",
    ".hypothesis",
    ".DS_Store",
    "Thumbs.db"
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--disable-warnings"
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "local: marks tests as local-only (excluded from CI)"
]

[dependency-groups]
dev = [
    "jsonschema==4.25.1",
    "pytest==8.4.2",
    "pytest-cov==7.0.0",
    "ruff==0.14.1",
]
# Moved holocron dependencies here from [project.optional-dependencies]
holocron = [
    "chromadb==1.2.0",
    "openai==2.5.0",
    "beautifulsoup4==4.14.2",
    "markdownify==1.2.0",
]

# Endor Cockpit configuration
[tool.endor_cockpit]
default_namespace = "endor-solutions-tgowan.cockpit"

# Holocron Knowledge Base Configuration
[tool.holocron]
db_path = ".workspace/holocron_data/vector_db"
manifest_path = ".workspace/holocron_data/vector_db_manifest.json"
default_collection = "endor_cockpit_docs"
embedding_model = "text-embedding-3-small"

    [tool.holocron.paths]
    include_dirs = ["docs/", "src/", "tests/", ".workspace/downloads/"]
    exclude_dirs = ["__pycache__", ".git", "node_modules", "venv", ".venv", "env", ".env", "holocron_data", ".workspace/holocron_data", "tmp"]

    # Collection definitions - each collection is self-contained
        [tool.holocron.collection.endor_user_docs]
        name = "External User Documentation"
        chunk_size = 6000
        overlap = 500
        delimiters = ["===", "---", "\\n\\n"]
        preserve_structure = true
        preserve_complete_sections = true

        # Simple array-based criteria
        path_patterns = [".workspace/downloads/user-docs/.*"]
        file_extensions = [".md"]
        not_path_patterns = [".workspace/downloads/user-docs/.*\\.rst$"]
        
        # Collection-specific external docs config
        openapi_url_template = "{ENDOR_API}/download/openapiv2.swagger.json"
        openapi_output = ".workspace/downloads/openapi-swagger.json"
        sitemap_url = "https://docs.endorlabs.com/sitemap.xml"
        sitemap_output = ".workspace/downloads/sitemap.xml"
        user_docs_output = ".workspace/downloads/user-docs/"
        max_age_days = 7

        [tool.holocron.collection.markdown]
        name = "Internal Markdown Documentation"
        chunk_size = 1607
        overlap = 400
        delimiters = ["##"]
        preserve_structure = true
        file_extensions = [".md"]
        not_path_patterns = [".workspace/downloads/user-docs/.*"]

        [tool.holocron.collection.code]
        name = "Source Code Files"
        chunk_size = 6851
        overlap = 500
        delimiters = ["def ", "class "]
        file_extensions = [".py", ".js", ".ts", ".go", ".java"]
        path_patterns = ["\\.py$", "\\.js$", "\\.ts$", "\\.go$", "\\.java$"]

        [tool.holocron.collection.api_spec]
        name = "API Specifications"
        chunk_size = 5000
        overlap = 300
        delimiters = ['"paths":', '"components":', '"definitions":']
        preserve_structure = true
        split_by_endpoints = true
        file_extensions = [".json", ".yaml", ".yml"]
        path_patterns = ["openapi.*\\.json$", "swagger.*\\.json$"]

# Logging configuration
[tool.logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[tool.logging.endor_cockpit]
level = "INFO"
format = "%(asctime)s - %(levelname)s - %(message)s"

[tool.logging.holocron]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"