[project]
name = "endor-cockpit"
version = "0.1.0"
description = "A foundational workspace to administer, operate and scan with Endor Labs tooling through REST APIs"
authors = [
    { name = "Your Name", email = "you@example.com" }
]
license = { file = "LICENSE" }
readme = "README.md"
requires-python = ">=3.12,<3.16"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests==2.32.5",
    "pydantic==2.12.3",
    "chromadb==1.2.0",
    "markdownify==1.2.0",
    "tomli==2.2.1; python_version < '3.11'",
]

 [project.optional-dependencies]
 # (Intentionally minimal; prefer dependency-groups for CI/dev/test installs.)


[build-system]
requires = ["hatchling>=1.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/endor_cockpit", "src/holocron"]

[tool.ruff]
line-length = 88
exclude = [
    ".git",
    ".venv",
    "venv",
    "env",
    "ENV",
    "env.bak",
    "venv.bak",
    ".vscode",
    ".idea",
    ".pytest_cache",
    ".tox",
    ".nox",
    ".ruff_cache",
    "holocron_data/",
    "holocron_data/**",
    "workspace",
    "workspace/**",
    "*.log",
    "__pycache__",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    "build",
    "dist",
    "*.egg-info",
    ".coverage",
    "coverage.xml",
    ".hypothesis",
    ".DS_Store",
    "Thumbs.db"
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--disable-warnings"
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests"
]

[dependency-groups]
dev = [
    "jsonschema==4.25.1",
    "pytest==8.4.2",
    "pytest-cov==7.0.0",
    "ruff==0.14.1",
]
cockpit = [
]
holocron = [
    "chromadb==1.2.0",
    "openai==2.5.0",
    "beautifulsoup4==4.14.2",
    "markdownify==1.2.0"
]

# Endor Cockpit configuration
[tool.endor_cockpit]
default_namespace = "endor-solutions-tgowan.cockpit"

# Vector Database configuration
[tool.vector_db]
# ChromaDB configuration
chroma_path = "workflow/vector_db"
collection_name = "endor_cockpit_docs"
embedding_model = "text-embedding-3-small"

# Chunking strategy configuration - empirical values from analysis
[tool.vector_db.chunking]
# Markdown (internal docs) - empirical P95 + 1000 buffer
markdown_max_chunk_size = 1607
markdown_overlap = 400
# External docs - empirical P95 + 1000 buffer
external_docs_max_chunk_size = 2165
external_docs_overlap = 500
# Code files - empirical P95 + 1000 buffer
code_max_chunk_size = 6851
code_overlap = 500
# OpenAPI specs
api_spec_max_chunk_size = 5000
api_spec_overlap = 300

# Content type detection patterns
[tool.vector_db.patterns]
markdown = ["\\.md$", "\\.rst$"]
code = ["\\.py$", "\\.js$", "\\.ts$", "\\.go$", "\\.java$"]
api_spec = ["openapi.*\\.json$", "swagger.*\\.json$", "\\.yaml$", "\\.yml$"]

# Logging configuration
[tool.logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[tool.logging.endor_cockpit]
level = "INFO"
format = "%(asctime)s - %(levelname)s - %(message)s"

[tool.logging.holocron]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
