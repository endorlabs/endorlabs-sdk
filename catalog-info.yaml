apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: endor-cockpit
  title: Endor Cockpit
  description: A foundational workspace to administer, operate and scan with Endor Labs tooling through REST APIs
  tags:
    - python
    - sdk
    - security
    - endor-labs
    - api-client
    - agent-friendly
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/source-location: url:https://github.com/<your-org>/endor-cockpit
spec:
  type: service
  lifecycle: production
  owner: endor-labs-team
  system: endor-platform
  providesApis:
    - endor-labs-api
  consumesApis:
    - endor-labs-api
  dependsOn:
    - endor-labs-platform
  metadata:
    deployment:
      environment: production
      region: global
      tier: foundational
    security:
      dataClassification: public
      piiHandling: none
      compliance: ["SOC2", "ISO27001"]
    operational:
      monitoring: enabled
      logging: structured
      alerting: configured
    architecture:
      pattern: sdk
      design: resource-oriented
      integration: rest-api
